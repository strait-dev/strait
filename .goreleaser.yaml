version: 2

project_name: orchestrator

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: orchestrator
    main: ./cmd/orchestrator
    binary: orchestrator
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

nfpms:
  - id: packages
    package_name: orchestrator
    vendor: leonardomso
    homepage: https://github.com/leonardomso/orchestrator
    maintainer: Leonardo Maldonado
    description: Production-grade job orchestrator CLI and server
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    contents:
      - src: LICENSE
        dst: /usr/share/doc/orchestrator/LICENSE

brews:
  - ids:
      - default
    repository:
      owner: leonardomso
      name: homebrew-tap
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    directory: Formula
    homepage: https://github.com/leonardomso/orchestrator
    description: Production-grade job orchestrator CLI and server
    license: MIT
    test: |
      system "#{bin}/orchestrator", "version", "--short"
    install: |
      bin.install "orchestrator"

dockers:
  - image_templates:
      - "ghcr.io/leonardomso/orchestrator:{{ .Version }}-amd64"
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/leonardomso/orchestrator"
    goarch: amd64
  - image_templates:
      - "ghcr.io/leonardomso/orchestrator:{{ .Version }}-arm64"
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/leonardomso/orchestrator"
    goarch: arm64

docker_manifests:
  - name_template: "ghcr.io/leonardomso/orchestrator:{{ .Version }}"
    image_templates:
      - "ghcr.io/leonardomso/orchestrator:{{ .Version }}-amd64"
      - "ghcr.io/leonardomso/orchestrator:{{ .Version }}-arm64"
  - name_template: "ghcr.io/leonardomso/orchestrator:latest"
    image_templates:
      - "ghcr.io/leonardomso/orchestrator:{{ .Version }}-amd64"
      - "ghcr.io/leonardomso/orchestrator:{{ .Version }}-arm64"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: leonardomso
    name: orchestrator
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
