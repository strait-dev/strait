[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "strait-python"
version = "0.1.0"
description = "Strait Python SDK"
readme = "README.md"
requires-python = ">=3.11"
dependencies = ["httpx>=0.28.0"]

[project.optional-dependencies]
dev = [
  "mypy>=1.18.2",
  "ruff>=0.14.1",
  "pytest>=8.0",
  "pytest-asyncio>=0.24",
  "respx>=0.22",
]

[tool.setuptools.packages.find]
include = ["strait*"]

[tool.ruff]
target-version = "py313"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.mypy]
python_version = "3.13"
strict = true
warn_return_any = true
warn_unused_configs = true

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false
disallow_untyped_calls = false
disallow_incomplete_defs = false
disable_error_code = ["misc", "var-annotated", "union-attr", "arg-type", "type-arg", "comparison-overlap"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
