# OpenTelemetry Collector configuration for Strait self-hosted monitoring.
# Receives OTLP from Strait and routes:
#   - Logs to Loki
#   - Traces to ClickHouse (via OTLP)

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    send_batch_size: 1000
    timeout: 5s

exporters:
  loki:
    endpoint: http://loki:3100/loki/api/v1/push

  otlphttp/clickhouse:
    endpoint: http://clickhouse:8123
    tls:
      insecure: true

  debug:
    verbosity: basic

service:
  pipelines:
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [loki]

    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/clickhouse]
