version: "2"

linters:
  default: none
  enable:
    - dupword
    - errcheck
    - errorlint
    - gocritic
    - godot
    - gosec
    - govet
    - ineffassign
    - misspell
    - modernize
    - nolintlint
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    - wastedassign

  settings:
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
          arguments:
            - disableStutteringCheck
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id

    gocritic:
      disabled-checks:
        - ifElseChain

    gosec:
      excludes:
        - G117  # Marshaled struct field matches secret pattern - config serialization is intentional
        - G703  # Path traversal via taint analysis - paths from CLI flags and literals
        - G704  # SSRF via taint analysis - URLs from validated job config
        - G706  # Log injection via taint analysis - structured logging is safe
    godot:
      scope: toplevel

    govet:
      disable:
        - fieldalignment

  exclusions:
    warn-unused: true
    presets:
      - comments
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - gosec
          - unparam
          - revive
      - path: internal/api/
        text: "avoid meaningless"
        linters:
          - revive
      - linters:
          - gosec
        text: "taint analysis|G117"

formatters:
  enable:
    - gofmt
    - goimports
