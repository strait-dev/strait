# Strait Self-Hosted Monitoring Stack (optional overlay)
#
# Usage:
#   docker compose -f docker-compose.selfhost.yml -f docker-compose.monitoring.yml up -d
#
# Adds: Prometheus, Grafana, ClickHouse, Loki, and OTEL Collector.
# Grafana dashboard: http://localhost:3001 (admin/admin)

services:
  # Override Strait to enable ClickHouse analytics and OTEL export.
  strait:
    environment:
      CLICKHOUSE_ENABLED: "true"
      CLICKHOUSE_EXPORT_ENABLED: "true"
      CLICKHOUSE_URL: "clickhouse://clickhouse:9000/strait"
      CLICKHOUSE_DATABASE: "strait"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
    depends_on:
      clickhouse:
        condition: service_healthy
      otel-collector:
        condition: service_started

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    volumes:
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/monitoring:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - clickhouse

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    restart: unless-stopped
    ports:
      - "8123:8123"
      - "9001:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  loki:
    image: grafana/loki:latest
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    restart: unless-stopped
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./configs/otel-collector.yml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      - loki
      - clickhouse

volumes:
  prometheus_data:
  grafana_data:
  clickhouse_data:
  loki_data:
