name: Setup JS toolchain
description: Install Bun (optionally Node), cache the bun install cache, and run bun install --frozen-lockfile.

inputs:
  node:
    description: When "true", also install Node.js. Needed for projects that shell out to Node (e.g. tsc).
    required: false
    default: "false"
  node-version:
    description: Node.js version to install when node is "true".
    required: false
    default: "22"
  bun-version:
    description: Bun version to install.
    required: false
    default: "1.3.14"

runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version: ${{ inputs.bun-version }}

    - if: ${{ inputs.node == 'true' }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}

    - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.bun/install/cache
        key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: |
          bun-${{ runner.os }}-

    - shell: bash
      run: bun install --frozen-lockfile
