name: Setup JS toolchain
description: Install Bun (optionally Node), cache the bun install cache, and run bun install --frozen-lockfile.

inputs:
  node:
    description: When "true", also install Node.js. Needed for projects that shell out to Node (e.g. tsc).
    required: false
    default: "false"
  node-version:
    description: Node.js version to install when node is "true".
    required: false
    default: "22"
  bun-version:
    description: Bun version to install.
    required: false
    default: "1.3.13"

runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - if: ${{ inputs.node == 'true' }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: ${{ inputs.node-version }}

    - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/.bun/install/cache
        key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: |
          bun-${{ runner.os }}-

    - shell: bash
      run: bun install --frozen-lockfile
