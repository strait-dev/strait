name: Lint

on:
  push:
    paths:
      - "apps/strait/**"
      - ".github/workflows/lint.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26.1"

jobs:
  lint:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        edition:
          - name: community
            args: --timeout=5m ./...
          - name: cloud
            args: --timeout=5m --build-tags=cloud ./...
    name: lint (${{ matrix.edition.name }})
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            apps/strait/go.sum

      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: v2.11.1
          working-directory: apps/strait
          args: ${{ matrix.edition.args }}

      - name: Publish lint summary
        if: always()
        working-directory: apps/strait
        run: |
          pkg_count=$(go list ./... | wc -l | tr -d ' ')
          {
            echo "## Lint Metrics (${{ matrix.edition.name }})"
            echo ""
            echo "- Packages linted: **${pkg_count}**"
            echo "- Build tags: **${{ matrix.edition.name }}**"
            echo "- Tests executed in this action: **0**"
            echo "- Notes: test counts and per-package coverage are published by the Test workflow."
          } >> "$GITHUB_STEP_SUMMARY"
