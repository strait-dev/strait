name: Lint

on:
  push:
    paths:
      - "apps/strait/**"
      - ".github/workflows/lint.yml"
      - ".github/actions/setup-go/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: lint
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-go

      - name: Restore golangci-lint cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: apps/strait/.cache/golangci-lint
          key: golangci-lint-v2.12.2-${{ runner.os }}-${{ hashFiles('apps/strait/.golangci.yml', 'apps/strait/go.sum') }}
          restore-keys: |
            golangci-lint-v2.12.2-${{ runner.os }}-

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.12.2
          install-only: true

      - name: Run lint
        working-directory: apps/strait
        run: ./scripts/lint-go.sh

      - name: Publish lint summary
        if: always()
        working-directory: apps/strait
        run: |
          pkg_count=$(go list ./... | wc -l | tr -d ' ')
          {
            echo "## Lint Metrics"
            echo ""
            echo "- Packages linted: **${pkg_count}**"
            echo "- Build contexts: **community, cloud**"
            echo "- Tests executed in this action: **0**"
            echo "- Notes: test counts and per-package coverage are published by the Test workflow."
          } >> "$GITHUB_STEP_SUMMARY"
