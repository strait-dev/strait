name: Lint

on:
  push:
    paths:
      - "apps/strait/**"
      - ".github/workflows/lint.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26"

jobs:
  lint:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            apps/strait/go.sum

      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: v2.11.1
          working-directory: apps/strait
          args: --timeout=5m ./...

      - name: Publish lint summary
        if: always()
        working-directory: apps/strait
        run: |
          pkg_count=$(go list ./... | wc -l | tr -d ' ')
          {
            echo "## Lint Metrics"
            echo ""
            echo "- Packages linted: **${pkg_count}**"
            echo "- Tests executed in this action: **0**"
            echo "- Notes: test counts and per-package coverage are published by the Test workflow."
          } >> "$GITHUB_STEP_SUMMARY"
