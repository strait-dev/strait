name: Lint

on:
  push:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26"

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            go.sum

      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m ./...

      - name: Publish lint summary
        if: always()
        run: |
          pkg_count=$(go list ./... | wc -l | tr -d ' ')
          {
            echo "## Lint Metrics"
            echo ""
            echo "- Packages linted: **${pkg_count}**"
            echo "- Tests executed in this action: **0**"
            echo "- Notes: test counts and per-package coverage are published by the Test workflow."
          } >> "$GITHUB_STEP_SUMMARY"
