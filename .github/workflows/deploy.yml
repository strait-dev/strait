name: Deploy

on:
  workflow_run:
    workflows: [Test, Lint, Security]
    types:
      - completed
    branches:
      - master
  push:
    tags:
      - "v*"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Staging: deploys on every master merge after Test/Lint/Security pass.
  deploy-staging:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'master'
    steps:
      - name: Check all required workflows passed
        uses: actions/github-script@v7
        with:
          script: |
            const required = ['Test', 'Lint', 'Security'];
            const { data: runs } = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_sha: context.payload.workflow_run.head_sha,
            });
            for (const name of required) {
              const run = runs.workflow_runs.find(r => r.name === name && r.status === 'completed');
              if (!run || run.conclusion !== 'success') {
                core.setFailed(`Required workflow "${name}" has not succeeded yet.`);
                return;
              }
            }
            core.info('All required workflows passed.');

      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy -a strait
        working-directory: apps/strait
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # Production: deploys on tag push (v*). Tag CI runs separately.
  deploy-production:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy -a strait
        working-directory: apps/strait
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
