name: Deploy

on:
  workflow_run:
    workflows: [Test, Lint, Security]
    types:
      - completed
    branches:
      - master
  push:
    tags:
      - "v*"

permissions:
  actions: read
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Staging: deploys on every master merge after Test/Lint/Security pass.
  deploy-staging:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'master'
    steps:
      - name: Check all required workflows passed
        id: check-workflows
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const required = ['Test', 'Lint', 'Security'];
            const { data: runs } = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_sha: context.payload.workflow_run.head_sha,
            });
            for (const name of required) {
              const run = runs.workflow_runs.find(r => r.name === name && r.status === 'completed');
              if (!run || run.conclusion !== 'success') {
                core.info(`Workflow "${name}" has not succeeded yet — skipping deploy until all pass.`);
                core.setOutput('ready', 'false');
                return;
              }
            }
            core.info('All required workflows passed.');
            core.setOutput('ready', 'true');

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        if: steps.check-workflows.outputs.ready == 'true'

      - uses: superfly/flyctl-actions/setup-flyctl@63da3ecc5e2793b98a3f2519b3d75d4f4c11cec2 # master
        if: steps.check-workflows.outputs.ready == 'true'

      - run: flyctl deploy -a strait
        if: steps.check-workflows.outputs.ready == 'true'
        working-directory: apps/strait
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify staging deployment health
        if: steps.check-workflows.outputs.ready == 'true'
        run: |
          sleep 10
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.strait.dev/health/ready || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Staging health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying in 10s..."
            sleep 10
          done
          echo "WARNING: Staging health check failed after 5 attempts."
          echo "Consider rollback: flyctl releases -a strait && flyctl deploy --image <previous-image>"
          exit 1

  # Production: deploys on tag push (v*) after verifying CI passed.
  deploy-production:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Verify CI passed for this commit
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const required = ['Test', 'Lint', 'Security'];
            const { data: checkRuns } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
            });
            for (const name of required) {
              const check = checkRuns.check_runs.find(r => r.name === name);
              if (!check || check.conclusion !== 'success') {
                // Fall back to workflow runs if checks API doesn't have it.
                const { data: runs } = await github.rest.actions.listWorkflowRunsForRepo({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  head_sha: context.sha,
                });
                const run = runs.workflow_runs.find(r => r.name === name && r.status === 'completed');
                if (!run || run.conclusion !== 'success') {
                  core.setFailed(`Required workflow "${name}" has not passed for ${context.sha}. Push the tag after CI completes.`);
                  return;
                }
              }
            }
            core.info('All required workflows passed for this tag.');

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: superfly/flyctl-actions/setup-flyctl@63da3ecc5e2793b98a3f2519b3d75d4f4c11cec2 # master

      - run: flyctl deploy -a strait
        working-directory: apps/strait
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify production deployment health
        run: |
          sleep 10
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.strait.dev/health/ready || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Production health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying in 10s..."
            sleep 10
          done
          echo "CRITICAL: Production health check failed after 5 attempts."
          echo "Rollback: flyctl releases -a strait && flyctl deploy --image <previous-image>"
          exit 1
