name: Website

on:
  push:
    paths:
      - "apps/website/**"
      - "packages/ui/**"
      - "packages/billing/**"
      - ".github/workflows/website.yml"
      - ".github/actions/setup-js/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: website-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-js

      - name: Biome lint
        working-directory: apps/website
        run: bun run biome:lint

  typecheck:
    name: Typecheck
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-js
        with:
          node: "true"

      - name: Astro check
        working-directory: apps/website
        run: bun run typecheck

  build:
    name: Build
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-js
        with:
          node: "true"

      - name: Build website
        working-directory: apps/website
        env:
          BASEHUB_TOKEN: ${{ secrets.BASEHUB_TOKEN }}
          PUBLIC_WEBSITE_URL: https://strait.dev
          PUBLIC_DASHBOARD_URL: https://app.strait.dev
          PUBLIC_GTM_ID: ${{ secrets.PUBLIC_GTM_ID }}
        run: bun run build

      - name: Upload build artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: website-dist
          path: apps/website/dist/
          retention-days: 1
