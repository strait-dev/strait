name: Secret Scan

# Secret scanning runs on every push regardless of which paths changed, so a
# leaked credential in apps/app, apps/docs, or packages/* is caught in CI and not
# only by the local pre-push hook.
on:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GITLEAKS_VERSION: 8.24.3
      GITLEAKS_SHA256: 9991e0b2903da4c8f6122b5c3186448b927a5da4deef1fe45271c3793f4ee29c
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Cache gitleaks binary
        id: cache-gitleaks
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.local/bin/gitleaks
          key: gitleaks-${{ runner.os }}-${{ env.GITLEAKS_VERSION }}

      - name: Install gitleaks
        if: steps.cache-gitleaks.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSfL -o /tmp/gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum -c -
          tar xzf /tmp/gitleaks.tar.gz -C "$HOME/.local/bin" gitleaks

      - name: Add gitleaks to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run gitleaks
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          HEAD_SHA: ${{ github.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          zero_sha="0000000000000000000000000000000000000000"

          if [[ "$REF_NAME" == "$DEFAULT_BRANCH" && "$PUSH_BEFORE" != "$zero_sha" ]]; then
            log_opts="$PUSH_BEFORE..$HEAD_SHA"
          else
            git fetch --no-tags --prune --depth=1 origin "$DEFAULT_BRANCH"
            merge_base="$(git merge-base HEAD "origin/$DEFAULT_BRANCH")"
            log_opts="$merge_base..HEAD"
          fi

          gitleaks detect --source=. --config=apps/strait/.gitleaks.toml --no-banner --verbose --exit-code=1 --log-opts="$log_opts"
