name: Load Tests

on:
  workflow_dispatch:
    inputs:
      volume_tier:
        description: "Volume tier for integration load tests"
        required: false
        default: "default"
        type: choice
        options:
          - default
          - large
          - extreme
      vegeta_duration:
        description: "Vegeta test duration override (e.g. 5s, 10s, 30s)"
        required: false
        default: "10s"
        type: string

permissions:
  contents: read

concurrency:
  group: loadtest-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26"

jobs:
  # ---------------------------------------------------------------------------
  # Vegeta HTTP load tests — split by domain, run in parallel via matrix
  # ---------------------------------------------------------------------------
  vegeta:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - domain: jobs-triggers
            run_filter: "^(TestJobs_|TestTriggers_)"
            label: "Jobs and Triggers"
          - domain: runs-workflows
            run_filter: "^(TestRuns_|TestWorkflows_|TestWorkflowRuns_)"
            label: "Runs and Workflows"
          - domain: sdk-webhooks
            run_filter: "^(TestSDK_|TestWebhook)"
            label: "SDK and Webhooks"
          - domain: rbac-envs-secrets
            run_filter: "^(TestRBAC_|TestEnvironments_|TestSecrets_)"
            label: "RBAC, Environments, and Secrets"
          - domain: events-groups
            run_filter: "^(TestEvents_|TestJobGroups_)"
            label: "Events and Job Groups"
          - domain: mixed-edge
            run_filter: "^(TestMixed_|TestEdge_)"
            label: "Mixed Workloads and Edge Cases"

    name: "vegeta / ${{ matrix.label }}"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            apps/strait/go.sum

      - name: Run ${{ matrix.label }} load tests
        working-directory: apps/strait
        run: |
          set -o pipefail
          go test -json -tags "loadtest,integration" \
            -timeout=25m -count=1 \
            -run '${{ matrix.run_filter }}' \
            ./test/loadtest/... 2>&1 | tee vegeta-${{ matrix.domain }}.jsonl

      - name: Generate summary
        if: always()
        working-directory: apps/strait
        run: go run ./test/loadtest/cmd/summary -input vegeta-${{ matrix.domain }}.jsonl -output vegeta-${{ matrix.domain }}-summary.md -suite "vegeta-${{ matrix.domain }}"

      - name: Publish summary
        if: always()
        working-directory: apps/strait
        run: cat vegeta-${{ matrix.domain }}-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vegeta-${{ matrix.domain }}
          if-no-files-found: ignore
          path: |
            apps/strait/vegeta-${{ matrix.domain }}.jsonl
            apps/strait/vegeta-${{ matrix.domain }}-summary.md

  # ---------------------------------------------------------------------------
  # Quick validation — capacity framework smoke test
  # ---------------------------------------------------------------------------
  quick-validation:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    name: "capacity / Quick Validation"
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: strait
          POSTGRES_PASSWORD: strait
          POSTGRES_DB: strait
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U strait"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: apps/strait/go.sum

      - name: Build test job images
        working-directory: packages/load-tests
        run: make build

      - name: Start Strait
        working-directory: apps/strait
        env:
          DATABASE_URL: postgres://strait:strait@localhost:5432/strait?sslmode=disable
          REDIS_URL: redis://localhost:6379
          INTERNAL_SECRET: ci-loadtest-secret-that-is-32chars
          JWT_SIGNING_KEY: ci-jwt-key-that-is-at-least-32chars
          ALLOW_PRIVATE_ENDPOINTS: "true"
          RATE_LIMIT_REQUESTS: "100000"
          TRIGGER_RATE_LIMIT_REQUESTS: "100000"
        run: |
          go run ./cmd/strait --mode all &
          sleep 10
          curl -sf http://localhost:8080/health

      - name: Run quick validation
        working-directory: apps/strait
        env:
          LOADTEST_QUICK: "true"
          LOADTEST_STRAIT_URL: http://localhost:8080
          LOADTEST_INTERNAL_SECRET: ci-loadtest-secret-that-is-32chars
          LOADTEST_DATABASE_URL: postgres://strait:strait@localhost:5432/strait?sslmode=disable
          LOADTEST_REDIS_URL: redis://localhost:6379
        run: |
          set -o pipefail
          go test -json -tags=loadtest \
            -run "TestQuickValidation|TestTestServerEndpoints|TestErrorScenarios" \
            -timeout=18m -count=1 \
            ./internal/loadtest/... 2>&1 | tee quick-validation.jsonl

      - name: Generate summary
        if: always()
        working-directory: apps/strait
        run: go run ./test/loadtest/cmd/summary -input quick-validation.jsonl -output quick-validation-summary.md -suite "quick-validation"

      - name: Publish summary
        if: always()
        working-directory: apps/strait
        run: cat quick-validation-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quick-validation
          if-no-files-found: ignore
          path: |
            apps/strait/quick-validation.jsonl
            apps/strait/quick-validation-summary.md

  # ---------------------------------------------------------------------------
  # Integration load tests — split into two parallel jobs
  # ---------------------------------------------------------------------------
  integration-queue-store:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    name: "integration / Queue, Store, Rate Limit"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            apps/strait/go.sum

      - name: Run queue, store, and rate limit load tests
        working-directory: apps/strait
        env:
          LOADTEST_VOLUME_TIER: ${{ inputs.volume_tier }}
        run: |
          set -o pipefail
          go test -json -tags=integration \
            -run "^(TestLoadQueue_|TestLoadStore_|TestLoadRateLimit_)" \
            -timeout=20m -count=1 \
            ./internal/e2e/... 2>&1 | tee integration-queue-store.jsonl

      - name: Generate summary
        if: always()
        working-directory: apps/strait
        run: go run ./test/loadtest/cmd/summary -input integration-queue-store.jsonl -output integration-queue-store-summary.md -suite integration-queue-store

      - name: Publish summary
        if: always()
        working-directory: apps/strait
        run: cat integration-queue-store-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-queue-store
          if-no-files-found: ignore
          path: |
            apps/strait/integration-queue-store.jsonl
            apps/strait/integration-queue-store-summary.md

  integration-pipeline:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    name: "integration / Pipeline, Worker, Webhook, Workflow"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            apps/strait/go.sum

      - name: Run pipeline, worker, webhook, and workflow load tests
        working-directory: apps/strait
        env:
          LOADTEST_VOLUME_TIER: ${{ inputs.volume_tier }}
        run: |
          set -o pipefail
          go test -json -tags=integration \
            -run "^(TestLoadPipeline_|TestLoadWorker_|TestLoadWebhook_|TestLoadWorkflow_)" \
            -timeout=20m -count=1 \
            ./internal/e2e/... 2>&1 | tee integration-pipeline.jsonl

      - name: Generate summary
        if: always()
        working-directory: apps/strait
        run: go run ./test/loadtest/cmd/summary -input integration-pipeline.jsonl -output integration-pipeline-summary.md -suite integration-pipeline

      - name: Publish summary
        if: always()
        working-directory: apps/strait
        run: cat integration-pipeline-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-pipeline
          if-no-files-found: ignore
          path: |
            apps/strait/integration-pipeline.jsonl
            apps/strait/integration-pipeline-summary.md
