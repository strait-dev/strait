name: SDK TypeScript CI

on:
  push:
    paths:
      - "packages/typescript-sdk/**"
  pull_request:
    paths:
      - "packages/typescript-sdk/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sdk-typescript-ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: bun install

      - name: Lint
        working-directory: packages/typescript-sdk
        run: bun run lint

      - name: Typecheck
        working-directory: packages/typescript-sdk
        run: bun run typecheck

      - name: Build
        working-directory: packages/typescript-sdk
        run: bun run build

      - name: Test
        working-directory: packages/typescript-sdk
        run: bun test
