name: Release Please

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # Mint a GitHub App installation token. This is required (not the
      # default GITHUB_TOKEN) because tags pushed using GITHUB_TOKEN do not
      # trigger downstream workflows. We need the v* tag push that
      # release-please performs to fire Publish Docker Images, which only
      # happens when the tag is pushed by an identity that is not the
      # ephemeral GITHUB_TOKEN.
      #
      # See: https://docs.github.com/en/actions/using-workflows/triggering-a-workflow#triggering-a-workflow-from-a-workflow
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.RELEASE_PLEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
          # Scope the installation token to the minimum release-please needs:
          # contents (commits, tags, releases) and pull-requests (the release PR).
          permission-contents: write
          permission-pull-requests: write

      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
