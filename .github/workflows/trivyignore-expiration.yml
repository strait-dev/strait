name: Trivyignore Expiration

on:
  schedule:
    # Weekly on Mondays at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: trivyignore-expiration
  cancel-in-progress: false

jobs:
  check-expirations:
    name: Check .trivyignore expirations
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Scan .trivyignore for expired entries
        id: scan
        run: |
          set -euo pipefail
          today=$(date -u +%Y-%m-%d)
          expired_file=$(mktemp)
          : > "$expired_file"

          while IFS= read -r line; do
            # Skip blank lines and comments
            [[ -z "${line// }" ]] && continue
            [[ "${line:0:1}" == "#" ]] && continue

            # Extract CVE ID (first token) and exp:YYYY-MM-DD
            cve=$(awk '{print $1}' <<< "$line")
            exp=$(grep -oE 'exp:[0-9]{4}-[0-9]{2}-[0-9]{2}' <<< "$line" | head -n1 | cut -d: -f2 || true)

            if [[ -z "$exp" ]]; then
              echo "::warning::$cve has no exp:YYYY-MM-DD marker"
              echo "- \`$cve\` — missing \`exp:YYYY-MM-DD\` marker" >> "$expired_file"
              continue
            fi

            if [[ "$exp" < "$today" ]]; then
              echo "::warning::$cve expired on $exp"
              echo "- \`$cve\` — expired on \`$exp\`" >> "$expired_file"
            fi
          done < .trivyignore

          if [[ -s "$expired_file" ]]; then
            echo "has_expired=true" >> "$GITHUB_OUTPUT"
            {
              echo "expired_body<<EOF"
              cat "$expired_file"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "has_expired=false" >> "$GITHUB_OUTPUT"
            echo "No expired .trivyignore entries"
          fi

      - name: Open or update tracking issue
        if: steps.scan.outputs.has_expired == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXPIRED_BODY: ${{ steps.scan.outputs.expired_body }}
        run: |
          set -euo pipefail
          title="chore(security): .trivyignore entries have expired"

          body=$(cat <<EOF
          The following \`.trivyignore\` entries have passed their \`exp:YYYY-MM-DD\` date and need to be reassessed.

          $EXPIRED_BODY

          For each entry:
          1. Re-check upstream for a fix (new base image, new dependency release).
          2. If fixed: bump the affected image/dependency and remove the line from \`.trivyignore\`.
          3. If still unfixed and still not exploitable in our context: extend the \`exp:\` date with a fresh rationale.

          Generated by \`.github/workflows/trivyignore-expiration.yml\`.
          EOF
          )

          existing=$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number' || true)
          if [[ -n "$existing" ]]; then
            gh issue edit "$existing" --body "$body"
            echo "Updated existing issue #$existing"
          else
            gh issue create --title "$title" --body "$body"
            echo "Opened new issue"
          fi
