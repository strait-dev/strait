name: E2E

on:
  push:
    paths:
      - "apps/app/**"
      - "apps/strait/**"
      - ".github/workflows/e2e.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26.1"
  BUN_VERSION: "1.3.11"
  NODE_VERSION: "22"

jobs:
  e2e:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: strait
          POSTGRES_PASSWORD: strait
          POSTGRES_DB: strait
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U strait"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://strait:strait@localhost:5432/strait_e2e_${{ github.run_id }}_${{ matrix.shard }}?sslmode=disable
      AUTH_DATABASE_URL: postgres://strait:strait@localhost:5432/strait_e2e_${{ github.run_id }}_${{ matrix.shard }}?sslmode=disable
      REDIS_URL: redis://localhost:6379/${{ matrix.shard }}
      INTERNAL_SECRET: ${{ secrets.E2E_INTERNAL_SECRET }}
      JWT_SIGNING_KEY: ${{ secrets.E2E_JWT_SIGNING_KEY }}
      BETTER_AUTH_SECRET: ${{ secrets.E2E_BETTER_AUTH_SECRET }}
      BETTER_AUTH_URL: http://localhost:5173
      STRAIT_API_URL: http://localhost:8080
      STRAIT_EDITION: community
      MODE: all
      PORT: 8080
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: apps/strait/go.sum

      - uses: oven-sh/setup-bun@735343b667d3e6a283f1b0c4a4e74a0ef4aba98c # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: apps/app
        run: bunx playwright install chromium --with-deps

      - name: Create isolated database
        run: |
          PGPASSWORD=strait createdb -h localhost -U strait \
            strait_e2e_${{ github.run_id }}_${{ matrix.shard }}

      - name: Run database migrations
        working-directory: apps/strait
        run: go run ./cmd/strait migrate up

      - name: Start Go backend
        working-directory: apps/strait
        run: go run ./cmd/strait --mode all &

      - name: Build app
        working-directory: apps/app
        env:
          DISABLE_NGROK: "1"
          NITRO_PRESET: node-server
        run: bun run build

      - name: Start app
        working-directory: apps/app
        env:
          DISABLE_NGROK: "1"
        run: bun run start &

      - name: Wait for services
        run: |
          timeout 60 bash -c 'until curl -sf http://localhost:8080/health; do sleep 2; done'
          timeout 30 bash -c 'until curl -sf http://localhost:5173; do sleep 2; done'

      - name: Run E2E tests
        working-directory: apps/app
        run: |
          bunx playwright test \
            --config e2e/playwright.config.ts \
            --shard=${{ matrix.shard }}/4

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: e2e-results-shard-${{ matrix.shard }}
          if-no-files-found: ignore
          retention-days: 7
          path: |
            apps/app/playwright-report/
            apps/app/test-results/

      - name: Cleanup database
        if: always()
        run: |
          PGPASSWORD=strait dropdb -h localhost -U strait --if-exists \
            strait_e2e_${{ github.run_id }}_${{ matrix.shard }}
