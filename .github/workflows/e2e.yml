name: E2E

on:
  push:
    paths:
      - "apps/app/**"
      - "packages/**"
      - "bun.lock"
      - ".github/workflows/e2e.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: strait
          POSTGRES_PASSWORD: strait
          POSTGRES_DB: strait
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U strait"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://strait:strait@localhost:5432/strait_e2e_${{ github.run_id }}_${{ matrix.shard }}?sslmode=disable
      AUTH_DATABASE_URL: postgres://strait:strait@localhost:5432/strait_e2e_${{ github.run_id }}_${{ matrix.shard }}?sslmode=disable
      REDIS_URL: redis://localhost:6379/${{ matrix.shard }}
      INTERNAL_SECRET: e2e-internal-secret-that-is-at-least-32-characters-long
      JWT_SIGNING_KEY: e2e-jwt-signing-key-that-is-at-least-32-characters
      BETTER_AUTH_SECRET: e2e-better-auth-secret-for-testing-only
      BETTER_AUTH_URL: http://localhost:5173
      STRAIT_API_URL: http://localhost:8080
      STRAIT_EDITION: community
      MODE: all
      PORT: 8080
      E2E_USER_EMAIL: e2e-test@strait.dev
      E2E_USER_PASSWORD: e2e-test-password-123

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-go

      - uses: ./.github/actions/setup-js

      - name: Install Playwright browsers
        working-directory: apps/app
        run: bunx playwright install chromium --with-deps

      - name: Create isolated database
        run: |
          PGPASSWORD=strait psql -h localhost -U strait -d strait -c \
            "CREATE DATABASE \"strait_e2e_${{ github.run_id }}_${{ matrix.shard }}\";"

      - name: Run database migrations
        working-directory: apps/strait
        run: go run ./cmd/strait migrate up

      - name: Build and start Go backend
        working-directory: apps/strait
        run: |
          go build -o ./strait-bin ./cmd/strait
          nohup ./strait-bin --mode all > /tmp/strait-backend.log 2>&1 &
          echo "Backend PID: $!"

      - name: Build and start app
        working-directory: apps/app
        env:
          DISABLE_NGROK: "1"
          PORT: "5173"
        run: |
          bun run build
          nohup bun run start > /tmp/strait-app.log 2>&1 &
          echo "App PID: $!"

      - name: Wait for services
        run: |
          echo "Waiting for Go backend..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Backend ready after ${i}s"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "Backend failed to start. Logs:"
              cat /tmp/strait-backend.log || true
              exit 1
            fi
            sleep 2
          done

          echo "Waiting for app..."
          for i in $(seq 1 30); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5173 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" != "000" ]; then
              echo "App ready after ${i}s (HTTP $HTTP_CODE)"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "App failed to start. Logs:"
              tail -50 /tmp/strait-app.log || true
              exit 1
            fi
            sleep 2
          done

      - name: Run E2E tests
        working-directory: apps/app
        run: |
          bunx playwright test \
            --config e2e/playwright.config.ts \
            --shard=${{ matrix.shard }}/4

      - name: Print backend logs on failure
        if: failure()
        run: |
          echo "=== Backend logs ==="
          cat /tmp/strait-backend.log || true
          echo "=== App logs ==="
          tail -100 /tmp/strait-app.log || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-results-shard-${{ matrix.shard }}
          if-no-files-found: ignore
          retention-days: 7
          path: |
            apps/app/playwright-report/
            apps/app/test-results/

      - name: Cleanup database
        if: always()
        run: |
          PGPASSWORD=strait psql -h localhost -U strait -d strait -c \
            "DROP DATABASE IF EXISTS \"strait_e2e_${{ github.run_id }}_${{ matrix.shard }}\";" || true
