name: Benchmarks

# Disabled: benchmarks are kept but not run automatically.
# To re-enable, uncomment the triggers below and remove the `if: false` from the job.
on:
  # pull_request:
  #   paths:
  #     - "apps/strait/**"
  #     - ".github/workflows/benchmarks.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: benchmarks-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: apps/strait/go.mod
          cache: true
          cache-dependency-path: |
            apps/strait/go.sum

      - name: Run benchmarks
        working-directory: apps/strait
        run: |
          set -o pipefail
          go test -bench . -benchmem -run=^$ -count=3 ./internal/... | tee benchmark-results.txt

      - name: Format benchmark summary
        if: always() && hashFiles('apps/strait/benchmark-results.txt') != ''
        working-directory: apps/strait
        run: go run ./scripts/format-benchmarks benchmark-results.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Upload raw benchmark results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-results
          if-no-files-found: ignore
          path: |
            apps/strait/benchmark-results.txt
