name: Test

on:
  push:
    paths:
      - "apps/strait/**"
      - ".github/workflows/test.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26.1"

jobs:
  build:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            apps/strait/go.sum

      - name: Build
        working-directory: apps/strait
        run: go build ./...

      - name: Vet
        working-directory: apps/strait
        run: go vet ./...

  unit-race:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: build
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            apps/strait/go.sum

      - name: Run unit tests (race)
        working-directory: apps/strait
        run: |
          set -o pipefail
          go test -json -race -timeout=5m ./... | tee unit-race-test.jsonl

      - name: Run package coverage (internal)
        if: always()
        working-directory: apps/strait
        run: |
          set -o pipefail
          go test -cover ./internal/... | tee unit-internal-coverage.txt

      - name: Check coverage threshold
        if: always()
        working-directory: apps/strait
        run: |
          MIN_COVERAGE=50
          below_threshold=0
          while IFS= read -r line; do
            pkg=$(echo "$line" | awk '{print $2}')
            cov=$(echo "$line" | grep -oP '[0-9.]+(?=% of statements)' || true)
            if [ -n "$cov" ]; then
              cov_int=${cov%%.*}
              if [ "$cov_int" -lt "$MIN_COVERAGE" ]; then
                echo "::warning::${pkg} coverage ${cov}% is below ${MIN_COVERAGE}% threshold"
                below_threshold=$((below_threshold + 1))
              fi
            fi
          done < unit-internal-coverage.txt
          if [ "$below_threshold" -gt 0 ]; then
            echo "::notice::${below_threshold} package(s) below ${MIN_COVERAGE}% coverage threshold"
          fi

      - name: Publish unit-race test and coverage summary
        if: always()
        working-directory: apps/strait
        run: |
          python3 - <<'PY'
          import json
          import re
          from pathlib import Path

          test_file = Path("unit-race-test.jsonl")
          coverage_file = Path("unit-internal-coverage.txt")
          summary_file = Path("/tmp/unit_race_summary.md")

          seen_tests = set()
          test_status = {}
          package_status = {}

          if test_file.exists():
              for raw in test_file.read_text(encoding="utf-8", errors="ignore").splitlines():
                  raw = raw.strip()
                  if not raw:
                      continue
                  try:
                      event = json.loads(raw)
                  except json.JSONDecodeError:
                      continue

                  pkg = event.get("Package", "")
                  action = event.get("Action", "")
                  test = event.get("Test", "")

                  if test and action == "run":
                      seen_tests.add((pkg, test))
                  if test and action in {"pass", "fail", "skip"}:
                      test_status[(pkg, test)] = action
                  if pkg and not test and action in {"pass", "fail", "skip"}:
                      package_status[pkg] = action

          passed = sum(1 for v in test_status.values() if v == "pass")
          failed = sum(1 for v in test_status.values() if v == "fail")
          skipped = sum(1 for v in test_status.values() if v == "skip")
          total_tests = len(seen_tests)

          package_cov = []
          cov_re = re.compile(r"^(ok|FAIL)\s+(\S+)\s+.*coverage:\s+([0-9.]+)% of statements")
          if coverage_file.exists():
              for line in coverage_file.read_text(encoding="utf-8", errors="ignore").splitlines():
                  m = cov_re.match(line.strip())
                  if not m:
                      continue
                  pkg = m.group(2)
                  cov = float(m.group(3))
                  if "/internal/" in pkg:
                      package_cov.append((pkg, cov))

          package_cov.sort(key=lambda item: item[0])

          lines = []
          lines.append("## Unit-Race Metrics")
          lines.append("")
          lines.append(f"- Total tests discovered: **{total_tests}**")
          lines.append(f"- Passed: **{passed}**")
          lines.append(f"- Failed: **{failed}**")
          lines.append(f"- Skipped: **{skipped}**")
          lines.append(f"- Packages reported: **{len(package_status)}**")
          lines.append("")
          lines.append("### Coverage by internal package")
          lines.append("")
          if package_cov:
              lines.append("| Package | Coverage |")
              lines.append("| --- | ---: |")
              for pkg, cov in package_cov:
                  lines.append(f"| `{pkg}` | {cov:.1f}% |")
          else:
              lines.append("No per-package coverage data found.")

          summary_file.write_text("\n".join(lines) + "\n", encoding="utf-8")
          print(summary_file.read_text(encoding="utf-8"))
          PY
          cat /tmp/unit_race_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload unit-race artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: unit-race-metrics
          if-no-files-found: ignore
          path: |
            apps/strait/unit-race-test.jsonl
            apps/strait/unit-internal-coverage.txt

  integration:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: build
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            apps/strait/go.sum

      - name: Run integration tests (race + coverage)
        working-directory: apps/strait
        run: |
          set -o pipefail
          go test -json -race -cover -tags=integration -timeout=20m ./internal/store ./internal/queue ./internal/pubsub ./internal/e2e | tee integration-test.jsonl
          grep -E '^(ok|FAIL)\s' integration-test.jsonl > /dev/null 2>&1 || true
          go tool test2json -t < /dev/null > /dev/null 2>&1 || true
          # Extract coverage lines from JSON output for the summary
          python3 -c "
          import json, sys
          for line in open('integration-test.jsonl'):
              try:
                  e = json.loads(line)
                  if e.get('Action') == 'output' and 'coverage:' in e.get('Output', ''):
                      sys.stdout.write(e['Output'])
              except: pass
          " > integration-coverage.txt

      - name: Publish integration test and coverage summary
        if: always()
        working-directory: apps/strait
        run: |
          python3 - <<'PY'
          import json
          import re
          from pathlib import Path

          test_file = Path("integration-test.jsonl")
          coverage_file = Path("integration-coverage.txt")
          summary_file = Path("/tmp/integration_summary.md")

          seen_tests = set()
          test_status = {}
          package_status = {}

          if test_file.exists():
              for raw in test_file.read_text(encoding="utf-8", errors="ignore").splitlines():
                  raw = raw.strip()
                  if not raw:
                      continue
                  try:
                      event = json.loads(raw)
                  except json.JSONDecodeError:
                      continue

                  pkg = event.get("Package", "")
                  action = event.get("Action", "")
                  test = event.get("Test", "")

                  if test and action == "run":
                      seen_tests.add((pkg, test))
                  if test and action in {"pass", "fail", "skip"}:
                      test_status[(pkg, test)] = action
                  if pkg and not test and action in {"pass", "fail", "skip"}:
                      package_status[pkg] = action

          passed = sum(1 for v in test_status.values() if v == "pass")
          failed = sum(1 for v in test_status.values() if v == "fail")
          skipped = sum(1 for v in test_status.values() if v == "skip")
          total_tests = len(seen_tests)

          package_cov = []
          cov_re = re.compile(r"^(ok|FAIL)\s+(\S+)\s+.*coverage:\s+([0-9.]+)% of statements")
          if coverage_file.exists():
              for line in coverage_file.read_text(encoding="utf-8", errors="ignore").splitlines():
                  m = cov_re.match(line.strip())
                  if not m:
                      continue
                  pkg = m.group(2)
                  cov = float(m.group(3))
                  if "/internal/" in pkg:
                      package_cov.append((pkg, cov))

          package_cov.sort(key=lambda item: item[0])

          lines = []
          lines.append("## Integration Metrics")
          lines.append("")
          lines.append(f"- Total tests discovered: **{total_tests}**")
          lines.append(f"- Passed: **{passed}**")
          lines.append(f"- Failed: **{failed}**")
          lines.append(f"- Skipped: **{skipped}**")
          lines.append(f"- Packages reported: **{len(package_status)}**")
          lines.append("")
          lines.append("### Coverage by internal package")
          lines.append("")
          if package_cov:
              lines.append("| Package | Coverage |")
              lines.append("| --- | ---: |")
              for pkg, cov in package_cov:
                  lines.append(f"| `{pkg}` | {cov:.1f}% |")
          else:
              lines.append("No per-package coverage data found.")

          summary_file.write_text("\n".join(lines) + "\n", encoding="utf-8")
          print(summary_file.read_text(encoding="utf-8"))
          PY
          cat /tmp/integration_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload integration artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: integration-metrics
          if-no-files-found: ignore
          path: |
            apps/strait/integration-test.jsonl
            apps/strait/integration-coverage.txt
