name: Test

on:
  push:
    paths:
      - "apps/strait/**"
      - "docker-compose.base.yml"
      - "docker-compose.selfhost.yml"
      - "Makefile"
      - ".env.example"
      - ".env.selfhost.example"
      - "packages/configs/**"
      - "packages/scripts/selfhost-init.sh"
      - ".github/workflows/test.yml"
      - ".github/actions/setup-go/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  compose-config:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate Docker Compose configs
        run: |
          set -euo pipefail
          cp .env.selfhost.example .env.selfhost
          docker compose \
            -f docker-compose.base.yml \
            -f apps/strait/docker-compose.yml \
            --profile core \
            --profile debug \
            --profile observability \
            config >/tmp/strait-dev-compose.yml
          docker compose \
            --env-file .env.selfhost \
            -f docker-compose.base.yml \
            -f docker-compose.selfhost.yml \
            --profile core \
            --profile dashboard \
            --profile observability \
            config >/tmp/strait-selfhost-compose.yml

  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-go

      # `go vet` is intentionally not run here: the Lint workflow runs
      # golangci-lint with the `govet` analyzer enabled for both community
      # and cloud build tags on the same path filter, so duplicating vet
      # here only adds wall-clock latency to unit tests.

      - name: Run unit tests
        working-directory: apps/strait
        run: |
          set -o pipefail
          go test -json -cover -shuffle=on -timeout=10m ./... \
            | tee unit-test.jsonl

      - name: Publish unit test summary
        if: always()
        working-directory: apps/strait
        run: |
          python3 - <<'PY'
          import json
          import re
          from pathlib import Path

          test_file = Path("unit-test.jsonl")
          summary_file = Path("/tmp/unit_summary.md")

          seen_tests = set()
          test_status = {}
          package_status = {}
          package_cov = []
          cov_re = re.compile(r"coverage:\s+([0-9.]+)% of statements")

          if test_file.exists():
              for raw in test_file.read_text(encoding="utf-8", errors="ignore").splitlines():
                  raw = raw.strip()
                  if not raw:
                      continue
                  try:
                      event = json.loads(raw)
                  except json.JSONDecodeError:
                      continue

                  pkg = event.get("Package", "")
                  action = event.get("Action", "")
                  test = event.get("Test", "")
                  output = event.get("Output", "")

                  if test and action == "run":
                      seen_tests.add((pkg, test))
                  if test and action in {"pass", "fail", "skip"}:
                      test_status[(pkg, test)] = action
                  if pkg and not test and action in {"pass", "fail", "skip"}:
                      package_status[pkg] = action
                  if action == "output" and "coverage:" in output:
                      m = cov_re.search(output)
                      if m and "/internal/" in pkg:
                          package_cov.append((pkg, float(m.group(1))))

          passed = sum(1 for v in test_status.values() if v == "pass")
          failed = sum(1 for v in test_status.values() if v == "fail")
          skipped = sum(1 for v in test_status.values() if v == "skip")
          total_tests = len(seen_tests)

          package_cov.sort(key=lambda item: item[0])

          MIN_COVERAGE = 50
          below = [(p, c) for p, c in package_cov if c < MIN_COVERAGE]

          lines = []
          lines.append("## Unit Test Metrics")
          lines.append("")
          lines.append(f"- Total tests: **{total_tests}**")
          lines.append(f"- Passed: **{passed}**")
          lines.append(f"- Failed: **{failed}**")
          lines.append(f"- Skipped: **{skipped}**")
          lines.append(f"- Packages: **{len(package_status)}**")
          lines.append("")
          if below:
              lines.append(f"> **{len(below)}** package(s) below {MIN_COVERAGE}% coverage threshold")
              lines.append("")
          lines.append("### Coverage by internal package")
          lines.append("")
          if package_cov:
              lines.append("| Package | Coverage |")
              lines.append("| --- | ---: |")
              for pkg, cov in package_cov:
                  flag = " :warning:" if cov < MIN_COVERAGE else ""
                  lines.append(f"| `{pkg}` | {cov:.1f}%{flag} |")
          else:
              lines.append("No per-package coverage data found.")

          summary_file.write_text("\n".join(lines) + "\n", encoding="utf-8")
          print(summary_file.read_text(encoding="utf-8"))
          PY
          cat /tmp/unit_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload unit test artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unit-test-metrics
          if-no-files-found: ignore
          path: |
            apps/strait/unit-test.jsonl

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GOMAXPROCS: "2"
      STRAIT_TEST_DB_MAX_CONNS: "4"
      STRAIT_TEST_PERSIST_CONTAINERS: "1"
      STRAIT_TEST_TIMING: "1"
    strategy:
      fail-fast: false
      matrix:
        shard:
          - name: smoke
            packages: ./internal/testutil/... ./internal/pubsub/...
            timeout: 8m
          - name: queue
            packages: ./internal/queue/...
            timeout: 10m
          - name: store
            packages: ./internal/store/...
            timeout: 12m
          - name: scheduler
            packages: ./internal/scheduler/... ./internal/workflow/...
            timeout: 10m
          - name: api
            packages: ./internal/api/...
            timeout: 10m
          - name: services
            packages: ./internal/worker/... ./internal/webhook/... ./internal/logdrain/... ./internal/notification/... ./internal/ratelimit/... ./internal/cdc/...
            timeout: 10m
          - name: e2e
            packages: ./internal/e2e/...
            timeout: 10m
    name: integration (${{ matrix.shard.name }})
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-go

      - name: Cache Docker images
        id: cache-docker-images
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/docker-images
          key: docker-test-images-postgres-18-redis-8-v1

      - name: Load or pull Docker images
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.cache/docker-images"
          for image in postgres:18-alpine redis:8-alpine; do
            tarball="$HOME/.cache/docker-images/${image//[:\/]/-}.tar"
            if [ -f "$tarball" ]; then
              docker load -i "$tarball"
            else
              docker pull "$image"
              docker save "$image" -o "$tarball"
            fi
          done

      - name: Run integration tests (${{ matrix.shard.name }})
        working-directory: apps/strait
        run: |
          set -o pipefail
          go test -p 2 -json -tags=integration -timeout=${{ matrix.shard.timeout }} \
            -failfast \
            ${{ matrix.shard.packages }} \
            | tee integration-test-${{ matrix.shard.name }}.jsonl

      - name: Publish integration test summary
        if: always()
        working-directory: apps/strait
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          shard = "${{ matrix.shard.name }}"
          test_file = Path(f"integration-test-{shard}.jsonl")
          summary_file = Path("/tmp/integration_summary.md")

          seen_tests = set()
          test_status = {}
          package_status = {}

          if test_file.exists():
              for raw in test_file.read_text(encoding="utf-8", errors="ignore").splitlines():
                  raw = raw.strip()
                  if not raw:
                      continue
                  try:
                      event = json.loads(raw)
                  except json.JSONDecodeError:
                      continue

                  pkg = event.get("Package", "")
                  action = event.get("Action", "")
                  test = event.get("Test", "")

                  if test and action == "run":
                      seen_tests.add((pkg, test))
                  if test and action in {"pass", "fail", "skip"}:
                      test_status[(pkg, test)] = action
                  if pkg and not test and action in {"pass", "fail", "skip"}:
                      package_status[pkg] = action

          passed = sum(1 for v in test_status.values() if v == "pass")
          failed = sum(1 for v in test_status.values() if v == "fail")
          skipped = sum(1 for v in test_status.values() if v == "skip")
          total_tests = len(seen_tests)

          lines = []
          lines.append(f"## Integration Test Metrics ({shard})")
          lines.append("")
          lines.append(f"- Total tests: **{total_tests}**")
          lines.append(f"- Passed: **{passed}**")
          lines.append(f"- Failed: **{failed}**")
          lines.append(f"- Skipped: **{skipped}**")
          lines.append(f"- Packages: **{len(package_status)}**")

          summary_file.write_text("\n".join(lines) + "\n", encoding="utf-8")
          print(summary_file.read_text(encoding="utf-8"))
          PY
          cat /tmp/integration_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload integration artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: integration-test-${{ matrix.shard.name }}
          if-no-files-found: ignore
          path: |
            apps/strait/integration-test-${{ matrix.shard.name }}.jsonl

      - name: Cleanup integration testcontainers
        if: always()
        run: |
          docker ps -aq --filter 'name=strait-test-' | xargs -r docker rm -f
