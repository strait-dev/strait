name: Test

on:
  push:
    paths:
      - "apps/strait/**"
      - ".github/workflows/test.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: apps/strait/go.mod
          cache: true
          cache-dependency-path: |
            apps/strait/go.sum

      - name: Build (community)
        working-directory: apps/strait
        run: go build ./...

      - name: Build (cloud)
        working-directory: apps/strait
        run: go build -tags cloud ./...

      - name: Vet (community)
        working-directory: apps/strait
        run: go vet ./...

      - name: Vet (cloud)
        working-directory: apps/strait
        run: go vet -tags cloud ./...

  unit:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: build
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: apps/strait/go.mod
          cache: true
          cache-dependency-path: |
            apps/strait/go.sum

      - name: Run unit tests (race + coverage)
        working-directory: apps/strait
        run: |
          set -o pipefail
          go test -json -race -cover -timeout=20m ./... \
            | tee unit-test.jsonl

      - name: Publish unit test summary
        if: always()
        working-directory: apps/strait
        run: |
          python3 - <<'PY'
          import json
          import re
          from pathlib import Path

          test_file = Path("unit-test.jsonl")
          summary_file = Path("/tmp/unit_summary.md")

          seen_tests = set()
          test_status = {}
          package_status = {}
          package_cov = []
          cov_re = re.compile(r"coverage:\s+([0-9.]+)% of statements")

          if test_file.exists():
              for raw in test_file.read_text(encoding="utf-8", errors="ignore").splitlines():
                  raw = raw.strip()
                  if not raw:
                      continue
                  try:
                      event = json.loads(raw)
                  except json.JSONDecodeError:
                      continue

                  pkg = event.get("Package", "")
                  action = event.get("Action", "")
                  test = event.get("Test", "")
                  output = event.get("Output", "")

                  if test and action == "run":
                      seen_tests.add((pkg, test))
                  if test and action in {"pass", "fail", "skip"}:
                      test_status[(pkg, test)] = action
                  if pkg and not test and action in {"pass", "fail", "skip"}:
                      package_status[pkg] = action
                  if action == "output" and "coverage:" in output:
                      m = cov_re.search(output)
                      if m and "/internal/" in pkg:
                          package_cov.append((pkg, float(m.group(1))))

          passed = sum(1 for v in test_status.values() if v == "pass")
          failed = sum(1 for v in test_status.values() if v == "fail")
          skipped = sum(1 for v in test_status.values() if v == "skip")
          total_tests = len(seen_tests)

          package_cov.sort(key=lambda item: item[0])

          MIN_COVERAGE = 50
          below = [(p, c) for p, c in package_cov if c < MIN_COVERAGE]

          lines = []
          lines.append("## Unit Test Metrics")
          lines.append("")
          lines.append(f"- Total tests: **{total_tests}**")
          lines.append(f"- Passed: **{passed}**")
          lines.append(f"- Failed: **{failed}**")
          lines.append(f"- Skipped: **{skipped}**")
          lines.append(f"- Packages: **{len(package_status)}**")
          lines.append("")
          if below:
              lines.append(f"> **{len(below)}** package(s) below {MIN_COVERAGE}% coverage threshold")
              lines.append("")
          lines.append("### Coverage by internal package")
          lines.append("")
          if package_cov:
              lines.append("| Package | Coverage |")
              lines.append("| --- | ---: |")
              for pkg, cov in package_cov:
                  flag = " :warning:" if cov < MIN_COVERAGE else ""
                  lines.append(f"| `{pkg}` | {cov:.1f}%{flag} |")
          else:
              lines.append("No per-package coverage data found.")

          summary_file.write_text("\n".join(lines) + "\n", encoding="utf-8")
          print(summary_file.read_text(encoding="utf-8"))
          PY
          cat /tmp/unit_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload unit test artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unit-test-metrics
          if-no-files-found: ignore
          path: |
            apps/strait/unit-test.jsonl

  integration:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: build
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: apps/strait/go.mod
          cache: true
          cache-dependency-path: |
            apps/strait/go.sum

      - name: Run integration tests (race + coverage)
        working-directory: apps/strait
        run: |
          set -o pipefail
          go test -json -race -cover -tags=integration -timeout=20m \
            ./... \
            | tee integration-test.jsonl

      - name: Publish integration test summary
        if: always()
        working-directory: apps/strait
        run: |
          python3 - <<'PY'
          import json
          import re
          from pathlib import Path

          test_file = Path("integration-test.jsonl")
          summary_file = Path("/tmp/integration_summary.md")

          seen_tests = set()
          test_status = {}
          package_status = {}
          package_cov = []
          cov_re = re.compile(r"coverage:\s+([0-9.]+)% of statements")

          if test_file.exists():
              for raw in test_file.read_text(encoding="utf-8", errors="ignore").splitlines():
                  raw = raw.strip()
                  if not raw:
                      continue
                  try:
                      event = json.loads(raw)
                  except json.JSONDecodeError:
                      continue

                  pkg = event.get("Package", "")
                  action = event.get("Action", "")
                  test = event.get("Test", "")
                  output = event.get("Output", "")

                  if test and action == "run":
                      seen_tests.add((pkg, test))
                  if test and action in {"pass", "fail", "skip"}:
                      test_status[(pkg, test)] = action
                  if pkg and not test and action in {"pass", "fail", "skip"}:
                      package_status[pkg] = action
                  if action == "output" and "coverage:" in output:
                      m = cov_re.search(output)
                      if m and "/internal/" in pkg:
                          package_cov.append((pkg, float(m.group(1))))

          passed = sum(1 for v in test_status.values() if v == "pass")
          failed = sum(1 for v in test_status.values() if v == "fail")
          skipped = sum(1 for v in test_status.values() if v == "skip")
          total_tests = len(seen_tests)

          package_cov.sort(key=lambda item: item[0])

          MIN_COVERAGE = 50
          below = [(p, c) for p, c in package_cov if c < MIN_COVERAGE]

          lines = []
          lines.append("## Integration Test Metrics")
          lines.append("")
          lines.append(f"- Total tests: **{total_tests}**")
          lines.append(f"- Passed: **{passed}**")
          lines.append(f"- Failed: **{failed}**")
          lines.append(f"- Skipped: **{skipped}**")
          lines.append(f"- Packages: **{len(package_status)}**")
          lines.append("")
          if below:
              lines.append(f"> **{len(below)}** package(s) below {MIN_COVERAGE}% coverage threshold")
              lines.append("")
          lines.append("### Coverage by internal package")
          lines.append("")
          if package_cov:
              lines.append("| Package | Coverage |")
              lines.append("| --- | ---: |")
              for pkg, cov in package_cov:
                  flag = " :warning:" if cov < MIN_COVERAGE else ""
                  lines.append(f"| `{pkg}` | {cov:.1f}%{flag} |")
          else:
              lines.append("No per-package coverage data found.")

          summary_file.write_text("\n".join(lines) + "\n", encoding="utf-8")
          print(summary_file.read_text(encoding="utf-8"))
          PY
          cat /tmp/integration_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload integration artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: integration-test-metrics
          if-no-files-found: ignore
          path: |
            apps/strait/integration-test.jsonl
