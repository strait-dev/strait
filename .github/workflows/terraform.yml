name: Terraform

on:
  push:
    branches:
      - master
    paths:
      - "apps/infra/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    paths:
      - "apps/infra/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: terraform-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/infra/terraform
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init (validation only)
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: tfsec Security Scan
        uses: aquasecurity/tfsec-action@b842aa196e956e8180c31e5c3ea30fc29e0368cd # v1.0.3
        with:
          working_directory: apps/infra/terraform
          soft_fail: true

  plan:
    name: Plan
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    if: github.event_name == 'pull_request'
    needs: validate
    defaults:
      run:
        working-directory: apps/infra/terraform
    env:
      TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
      TF_VAR_ssh_key_path: "/dev/null"
      TF_VAR_ssh_private_key_path: "/dev/null"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Init
        if: env.TF_VAR_hcloud_token != ''
        run: terraform init -backend=false

      - name: Terraform Plan
        if: env.TF_VAR_hcloud_token != ''
        id: plan
        run: terraform plan -no-color -input=false 2>&1 | tee /tmp/plan.txt
        continue-on-error: true

      - name: Post Plan to PR
        if: env.TF_VAR_hcloud_token != '' && steps.plan.outcome != 'skipped'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('/tmp/plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n... (truncated)' : plan;

            const body = `### Terraform Plan
            \`\`\`
            ${truncated}
            \`\`\`
            *Plan generated by CI. Apply manually with \`make infra-up\`.*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1
