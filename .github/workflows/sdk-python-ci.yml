name: SDK Python CI

on:
  push:
    paths:
      - "packages/python-sdk/**"
  pull_request:
    paths:
      - "packages/python-sdk/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sdk-python-ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: packages/python-sdk
        run: pip install -e ".[dev]"

      - name: Lint
        working-directory: packages/python-sdk
        run: ruff check strait/ tests/

      - name: Typecheck
        working-directory: packages/python-sdk
        run: mypy strait/

      - name: Test
        working-directory: packages/python-sdk
        run: pytest tests/ -v
