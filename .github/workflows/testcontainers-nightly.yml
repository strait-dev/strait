name: Integration Testcontainers (Nightly)

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-testcontainers-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: "1.26.1"

jobs:
  integration-testcontainers:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            apps/strait/go.sum

      - name: Run integration tests in testcontainers mode
        working-directory: apps/strait
        run: |
          set -o pipefail
          go test -json -race -cover -tags=integration -timeout=30m \
            ./internal/store \
            ./internal/queue \
            ./internal/pubsub \
            ./internal/e2e \
            ./internal/billing \
            ./internal/worker \
            ./internal/cdc \
            ./internal/webhook \
            | tee integration-testcontainers.jsonl

      - name: Upload nightly integration artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nightly-integration-testcontainers
          if-no-files-found: ignore
          path: |
            apps/strait/integration-testcontainers.jsonl
