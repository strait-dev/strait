name: Test (race detector)

# Race-detector runs are 2-10x slower than the standard suite, so they are
# kept off the PR path. This workflow runs the full unit + integration suite
# with `-race` on a nightly schedule, on every push to master, and on demand
# via workflow_dispatch.

on:
  schedule:
    # 07:00 UTC daily
    - cron: "0 7 * * *"
  push:
    branches:
      - master
    paths:
      - "apps/strait/**"
      - ".github/workflows/test-race.yml"
      - ".github/actions/setup-go/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-race-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-race:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GOMAXPROCS: "2"
    strategy:
      fail-fast: false
      matrix:
        shard:
          - name: cmd
            packages: ./cmd/...
          - name: api
            packages: ./internal/api/...
          - name: orchestration
            packages: ./internal/queue/... ./internal/scheduler/... ./internal/store/... ./internal/workflow/...
          - name: platform
            packages: ./internal/billing/... ./internal/bundle/... ./internal/cache/... ./internal/clickhouse/... ./internal/config/... ./internal/crypto/... ./internal/dbscan/... ./internal/debug/... ./internal/domain/... ./internal/errors/... ./internal/eventfilter/... ./internal/health/... ./internal/httputil/... ./internal/migrationlint/... ./internal/telemetry/...
          - name: services
            packages: ./internal/apikeycache/... ./internal/cdc/... ./internal/loadtest/... ./internal/logdrain/... ./internal/notification/... ./internal/pubsub/... ./internal/ratelimit/... ./internal/testutil/... ./internal/webhook/... ./internal/worker/...
    name: unit-race (${{ matrix.shard.name }})
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-go

      - name: Run unit tests with race detector
        working-directory: apps/strait
        run: go test -race -shuffle=on -timeout=20m ${{ matrix.shard.packages }}

  integration-race:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GOMAXPROCS: "2"
      STRAIT_TEST_DB_MAX_CONNS: "4"
      STRAIT_TEST_PERSIST_CONTAINERS: "1"
      STRAIT_TEST_TIMING: "1"
    strategy:
      fail-fast: false
      matrix:
        shard:
          - name: smoke
            packages: ./internal/testutil/... ./internal/pubsub/...
            timeout: 15m
          - name: queue
            packages: ./internal/queue/...
            timeout: 20m
          - name: store
            packages: ./internal/store/...
            timeout: 25m
          - name: scheduler
            packages: ./internal/scheduler/... ./internal/workflow/...
            timeout: 20m
          - name: api
            packages: ./internal/api/...
            timeout: 20m
          - name: services
            packages: ./internal/worker/... ./internal/webhook/... ./internal/logdrain/... ./internal/notification/... ./internal/ratelimit/... ./internal/cdc/...
            timeout: 20m
          - name: e2e
            packages: ./internal/e2e/...
            timeout: 20m
    name: integration-race (${{ matrix.shard.name }})
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-go

      - name: Pull Docker images
        run: |
          docker pull postgres:18-alpine
          docker pull redis:8-alpine

      - name: Run integration tests with race detector
        working-directory: apps/strait
        run: |
          go test -p 2 -race -tags=integration -timeout=${{ matrix.shard.timeout }} \
            ${{ matrix.shard.packages }}

      - name: Cleanup integration testcontainers
        if: always()
        run: |
          docker ps -aq --filter 'name=strait-test-' | xargs -r docker rm -f
