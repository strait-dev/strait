name: Publish Runtime Base Images

on:
  push:
    tags:
      - "runtime-v*"
    paths:
      - "apps/strait/build/runtimes/**"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (e.g. 1.2.3). Defaults to 'dev' when running manually."
        required: false
        default: "dev"

permissions:
  contents: read

concurrency:
  group: publish-runtimes-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_ORG: strait-dev

jobs:
  resolve-tag:
    name: Resolve image tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.tag.outputs.value }}
      push: ${{ steps.tag.outputs.push }}
    steps:
      - name: Determine tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "push=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/runtime-v* ]]; then
            echo "value=${GITHUB_REF_NAME#runtime-v}" >> "$GITHUB_OUTPUT"
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=pr-${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.runtime }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    needs: resolve-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: python
            dockerfile: python.Dockerfile
            base_version: "3.13"
            version_arg: PYTHON_VERSION
          - runtime: typescript
            dockerfile: typescript.Dockerfile
            base_version: "1.2"
            version_arg: BUN_VERSION
          - runtime: ruby
            dockerfile: ruby.Dockerfile
            base_version: "3.3"
            version_arg: RUBY_VERSION
          - runtime: rust
            dockerfile: rust.Dockerfile
            base_version: "1.83"
            version_arg: RUST_VERSION
          - runtime: go
            dockerfile: golang.Dockerfile
            base_version: "1.26"
            version_arg: GO_VERSION

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        if: needs.resolve-tag.outputs.push == 'true'
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        if: needs.resolve-tag.outputs.push == 'true'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.runtime }}
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: apps/strait/build/runtimes
          file: apps/strait/build/runtimes/${{ matrix.dockerfile }}
          platforms: ${{ needs.resolve-tag.outputs.push == 'true' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: ${{ needs.resolve-tag.outputs.push == 'true' }}
          load: ${{ needs.resolve-tag.outputs.push != 'true' }}
          build-args: |
            ${{ matrix.version_arg }}=${{ matrix.base_version }}
            STRAIT_SDK_VERSION=
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_ORG }}/runtime-${{ matrix.runtime }}:${{ needs.resolve-tag.outputs.tag }}
            ${{ needs.resolve-tag.outputs.push == 'true' && format('{0}/{1}/runtime-{2}:latest', env.REGISTRY, env.IMAGE_ORG, matrix.runtime) || '' }}
          cache-from: type=gha,scope=runtime-${{ matrix.runtime }}
          cache-to: type=gha,mode=max,scope=runtime-${{ matrix.runtime }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Scan ${{ matrix.runtime }} for vulnerabilities
        if: needs.resolve-tag.outputs.push == 'true'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_ORG }}/runtime-${{ matrix.runtime }}:${{ needs.resolve-tag.outputs.tag }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
