name: Publish Docker Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  packages: write

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  check-ci:
    name: Wait for CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Wait for Test, Lint, Security to pass
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            if (context.eventName === 'workflow_dispatch') {
              core.info('Manual dispatch -- skipping CI check.');
              return;
            }
            const required = ['Test', 'Lint', 'Security'];
            const maxWait = 15 * 60 * 1000; // 15 minutes
            const poll = 30 * 1000; // 30 seconds
            const start = Date.now();

            while (Date.now() - start < maxWait) {
              const { data: runs } = await github.rest.actions.listWorkflowRunsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head_sha: context.sha,
              });

              const results = required.map(name => {
                const run = runs.workflow_runs.find(r => r.name === name);
                return { name, status: run?.status, conclusion: run?.conclusion };
              });

              const allDone = results.every(r => r.status === 'completed');
              if (allDone) {
                const failed = results.filter(r => r.conclusion !== 'success');
                if (failed.length > 0) {
                  core.setFailed(`CI failed: ${failed.map(f => `${f.name}=${f.conclusion}`).join(', ')}`);
                  return;
                }
                core.info('All required workflows passed.');
                return;
              }

              const pending = results.filter(r => r.status !== 'completed').map(r => r.name);
              core.info(`Waiting for: ${pending.join(', ')} (${Math.round((Date.now() - start) / 1000)}s elapsed)`);
              await new Promise(r => setTimeout(r, poll));
            }
            core.setFailed('Timed out waiting for CI workflows to complete.');

  community-api:
    needs: check-ci
    name: Community API Image
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/strait-dev/strait
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: apps/strait
          file: apps/strait/Dockerfile
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            DATE=${{ github.event.head_commit.timestamp }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/strait-dev/strait:${{ steps.meta.outputs.version }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          timeout: 10m

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: apps/strait
          file: apps/strait/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            DATE=${{ github.event.head_commit.timestamp }}

  loadtest:
    needs: check-ci
    name: Loadtest Image
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/strait-dev/strait-loadtest
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: apps/strait
          file: apps/strait/test/e2e_stress/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
