name: SDK Go CI

on:
  push:
    paths:
      - "packages/go-sdk/**"
  pull_request:
    paths:
      - "packages/go-sdk/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sdk-go-ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: |
            packages/go-sdk/go.sum

      - name: Build
        working-directory: packages/go-sdk
        run: go build ./...

      - name: Vet
        working-directory: packages/go-sdk
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: v2.11.1
          working-directory: packages/go-sdk
          args: --timeout=5m ./...

      - name: Test
        working-directory: packages/go-sdk
        run: go test -race ./...
