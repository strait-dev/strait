#cloud-config

# ──────────────────────────────────────────────
# Security Hardening
# ──────────────────────────────────────────────

ssh_pwauth: false

package_update: true
packages:
  - curl
  - fail2ban
  - unattended-upgrades

write_files:
  # SSH hardening.
  - path: /etc/ssh/sshd_config.d/99-strait-hardening.conf
    content: |
      PasswordAuthentication no
      PermitRootLogin prohibit-password
      MaxAuthTries 3
      X11Forwarding no
      AllowTcpForwarding no
      ClientAliveInterval 300
      ClientAliveCountMax 2

  # Automatic security updates.
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

runcmd:
  # Apply SSH hardening.
  - systemctl restart sshd

  # Start fail2ban.
  - systemctl enable fail2ban
  - systemctl start fail2ban

  # ──────────────────────────────────────────────
  # Install k3s Agent
  # ──────────────────────────────────────────────
  # Wait for master to be reachable on the private network.
  - while ! curl -sf -o /dev/null --connect-timeout 2 https://${master_private_ip}:6443 -k 2>/dev/null; do echo "Waiting for master..."; sleep 5; done

  # Join the cluster with node pool label.
  # --flannel-iface eth1: use private network for pod networking.
  # --node-label: set the pool label for job scheduling affinity.
  # --protect-kernel-defaults: enforce sysctl security defaults.
  - curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="agent --flannel-iface eth1 --node-label strait.dev/pool=${node_pool} --protect-kernel-defaults" K3S_URL="https://${master_private_ip}:6443" K3S_TOKEN="${k3s_token}" sh -
