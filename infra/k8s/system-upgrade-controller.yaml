# k3s System Upgrade Controller.
# Automatically upgrades k3s when a new stable release is available.
# See: https://docs.k3s.io/upgrades/automated
#
# Apply with: kubectl apply -f system-upgrade-controller.yaml
# Then apply upgrade-plans.yaml to define which nodes to upgrade.
apiVersion: v1
kind: Namespace
metadata:
  name: system-upgrade
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: system-upgrade
  namespace: system-upgrade
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: system-upgrade
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: system-upgrade
    namespace: system-upgrade
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: system-upgrade-controller
  namespace: system-upgrade
spec:
  selector:
    matchLabels:
      upgrade.cattle.io/controller: system-upgrade-controller
  template:
    metadata:
      labels:
        upgrade.cattle.io/controller: system-upgrade-controller
    spec:
      serviceAccountName: system-upgrade
      tolerations:
        - key: CriticalAddonsOnly
          operator: Exists
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/controlplane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/etcd
          operator: Exists
          effect: NoExecute
      containers:
        - name: system-upgrade-controller
          image: rancher/system-upgrade-controller:v0.14.2
          imagePullPolicy: IfNotPresent
          env:
            - name: SYSTEM_UPGRADE_CONTROLLER_DEBUG
              value: "false"
            - name: SYSTEM_UPGRADE_CONTROLLER_THREADS
              value: "2"
            - name: SYSTEM_UPGRADE_JOB_ACTIVE_DEADLINE_SECONDS
              value: "900"
            - name: SYSTEM_UPGRADE_JOB_BACKOFF_LIMIT
              value: "99"
            - name: SYSTEM_UPGRADE_JOB_IMAGE_PULL_POLICY
              value: "Always"
            - name: SYSTEM_UPGRADE_JOB_KUBECTL_IMAGE
              value: "rancher/kubectl:v1.31.0"
            - name: SYSTEM_UPGRADE_JOB_PRIVILEGED
              value: "true"
            - name: SYSTEM_UPGRADE_JOB_TTL_SECONDS_AFTER_FINISH
              value: "900"
            - name: SYSTEM_UPGRADE_PLAN_POLLING_INTERVAL
              value: "15m"
          volumeMounts:
            - name: etc-ssl
              mountPath: /etc/ssl
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: etc-ssl
          hostPath:
            path: /etc/ssl
            type: DirectoryOrCreate
        - name: tmp
          emptyDir: {}
