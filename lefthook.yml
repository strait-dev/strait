# Lefthook git hooks configuration.
# Mirrors the CI lint pipelines for Go backend, apps, and all SDKs.
# All hooks run on every commit to catch cross-cutting issues early.

pre-commit:
  parallel: true
  commands:
    # --- Go backend (golangci-lint includes go vet) ---
    lint:
      run: cd apps/strait && golangci-lint run --timeout=5m ./...
      fail_text: "golangci-lint failed — fix lint errors before committing"
    govulncheck:
      run: cd apps/strait && govulncheck ./...
      fail_text: "govulncheck found vulnerabilities — run 'govulncheck ./...' in apps/strait"
    openapi_parity:
      run: cd apps/strait && go run ./scripts/check-openapi-parity
      fail_text: "OpenAPI parity check failed — sync routes.go with both OpenAPI specs before committing"

    # --- Frontend app (apps/app) ---
    app_lint:
      run: cd apps/app && bun run biome:lint
      fail_text: "App lint failed — run 'bun run biome:lint' in apps/app"
    app_typecheck:
      run: cd apps/app && bun run typecheck
      fail_text: "App typecheck failed — run 'bun run typecheck' in apps/app"

    # --- Website (apps/website) ---
    website_lint:
      run: cd apps/website && bun run biome:lint
      fail_text: "Website lint failed — run 'bun run biome:lint' in apps/website"
    website_typecheck:
      run: cd apps/website && bun run typecheck
      fail_text: "Website typecheck failed — run 'bun run typecheck' in apps/website"

    # --- Docs (apps/docs) ---
    docs_lint:
      run: cd apps/docs && bun run biome:lint
      fail_text: "Docs lint failed — run 'bun run biome:lint' in apps/docs"
    docs_typecheck:
      run: cd apps/docs && node node_modules/fumadocs-mdx/dist/bin.js && bun run typecheck
      fail_text: "Docs typecheck failed — run 'bun run typecheck' in apps/docs"

    # --- TypeScript SDK ---
    ts_sdk_lint:
      run: cd packages/typescript-sdk && bun run lint
      fail_text: "TypeScript SDK lint failed — run 'bun run lint' in packages/typescript-sdk"
    ts_sdk_typecheck:
      run: cd packages/typescript-sdk && bun run typecheck
      fail_text: "TypeScript SDK typecheck failed — run 'bun run typecheck' in packages/typescript-sdk"
    ts_sdk_contracts:
      run: cd packages/typescript-sdk && bun test test/openapi-coverage.test.ts
      fail_text: "TypeScript SDK contract test failed — run 'bun run generate:contracts' in packages/typescript-sdk"

    # --- Rust SDK ---
    rust_sdk_fmt:
      run: cd packages/rust-sdk && cargo fmt -- --check
      fail_text: "Rust SDK format check failed — run 'cargo fmt' in packages/rust-sdk"
    rust_sdk_clippy:
      run: cd packages/rust-sdk && cargo clippy -- -D warnings
      fail_text: "Rust SDK clippy failed — run 'cargo clippy --fix' in packages/rust-sdk"

commit-msg:
  commands:
    conventional_commits:
      run: "grep -qE '^(feat|fix|docs|test|refactor|perf|build|ci|chore|revert)(\\(.+\\))?!?: .{1,}$' {1} || (echo 'Commit message must follow Conventional Commits: type(scope): message' && exit 1)"
      fail_text: "Commit message must follow Conventional Commits format: type(scope): message"
