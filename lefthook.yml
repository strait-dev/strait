min_version: 2.1.5
assert_lefthook_installed: true

output:
  - meta
  - summary
  - failure
  - execution_info
  - execution_out

pre-commit:
  parallel: true
  follow: true
  commands:
    gitleaks:
      priority: 1
      run: |
        if command -v gitleaks > /dev/null 2>&1; then
          gitleaks protect --staged --config=.gitleaks.toml --no-banner
        fi
      fail_text: "Secrets detected in staged files"
      timeout: 30s
      skip:
        - merge
        - rebase

    biome:
      priority: 2
      glob: "*.{ts,tsx,js,jsx,mjs,cjs,json,jsonc,css}"
      run: bunx biome check --write --unsafe --no-errors-on-unmatched {staged_files}
      stage_fixed: true
      fail_text: "Biome check failed"
      timeout: 60s
      skip:
        - merge
        - rebase

pre-push:
  follow: true
  parallel: true
  jobs:
    - name: gitleaks
      skip:
        - run: test "${SKIP_RUN_ALL:-0}" = "1"
      run: |
        if command -v gitleaks > /dev/null 2>&1; then
          gitleaks detect --source=. --config=.gitleaks.toml --no-banner --log-opts="origin/master..HEAD"
        fi
      fail_text: "Secrets detected in commits being pushed"
      timeout: 60s

    - name: manypkg_check
      glob:
        - "package.json"
        - "**/package.json"
        - "bun.lock"
      skip:
        - run: test "${SKIP_RUN_ALL:-0}" = "1"
      run: bun run manypkg:check
      fail_text: "manypkg check failed"
      timeout: 30s

    - name: biome
      glob: "*.{ts,tsx,js,jsx,mjs,cjs,json,jsonc,css}"
      skip:
        - run: test "${SKIP_RUN_ALL:-0}" = "1"
      run: bunx biome check .
      fail_text: "biome check failed"
      timeout: 60s

    - name: typecheck
      glob:
        - "*.{ts,tsx,js,jsx,mjs,cjs}"
        - "package.json"
        - "bun.lock"
        - "turbo.json"
      skip:
        - run: test "${SKIP_RUN_ALL:-0}" = "1"
      run: bun run typecheck
      fail_text: "typecheck failed"
      timeout: 180s

    - name: buf_lint
      glob: "apps/strait/proto/**/*.proto"
      skip:
        - run: test "${SKIP_RUN_ALL:-0}" = "1"
      run: |
        if command -v buf > /dev/null 2>&1; then
          cd apps/strait && buf lint
        fi
      fail_text: "buf lint failed (install buf: brew install bufbuild/buf/buf)"
      timeout: 60s

    - name: zizmor
      glob:
        - ".github/workflows/**"
        - ".github/actions/**"
      skip:
        - run: test "${SKIP_RUN_ALL:-0}" = "1"
      run: |
        if command -v zizmor > /dev/null 2>&1; then
          zizmor --offline .github/workflows .github/actions
        fi
      fail_text: "zizmor found GitHub Actions security issues (install: brew install zizmor)"
      timeout: 30s


commit-msg:
  commands:
    conventional_commits:
      run: "grep -qE '^(feat|fix|docs|test|refactor|perf|build|ci|chore|revert|style)(\\(.+\\))?!?: .{1,}$' {1} || (echo 'Commit message must follow Conventional Commits: type(scope): message' && exit 1)"
      fail_text: "Commit message must follow Conventional Commits format: type(scope): message"
