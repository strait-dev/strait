min_version: 2.1.5

output:
  - meta
  - summary
  - failure
  - execution_info
  - execution_out

pre-commit:
  parallel: true
  follow: true
  commands:
    gitleaks:
      priority: 1
      run: command -v gitleaks > /dev/null 2>&1 && gitleaks protect --staged --no-banner || true
      fail_text: "Secrets detected in staged files"
      timeout: 30s
      skip:
        - merge
        - rebase

    biome:
      priority: 2
      glob: "*.{ts,tsx,js,jsx,mjs,cjs,json,jsonc,css}"
      run: bunx biome check --write --unsafe --no-errors-on-unmatched {staged_files}
      stage_fixed: true
      fail_text: "Biome check failed"
      timeout: 60s
      skip:
        - merge
        - rebase

pre-push:
  follow: true
  jobs:
    - name: thorough
      glob:
        - "*.{ts,tsx,js,jsx,mjs,cjs}"
        - "*.go"
        - "package.json"
        - "bun.lock"
        - "turbo.json"
        - "biome.json"
      skip:
        - run: test "${SKIP_RUN_ALL:-0}" = "1"
      group:
        piped: true
        jobs:
          - name: manypkg_check
            run: bun run manypkg:check
            fail_text: "manypkg check failed"
            timeout: 30s

          - name: typecheck_affected
            run: bun run typecheck:affected
            fail_text: "typecheck failed"
            timeout: 180s

          - name: go_lint_fast
            run: |
              export GOCACHE="$PWD/.cache/go-build"
              export GOLANGCI_LINT_CACHE="$PWD/.cache/golangci-lint"
              mkdir -p "$GOCACHE" "$GOLANGCI_LINT_CACHE"
              bun run go:lint:fast
            fail_text: "go:lint:fast failed"
            timeout: 180s

commit-msg:
  commands:
    conventional_commits:
      run: "grep -qE '^(feat|fix|docs|test|refactor|perf|build|ci|chore|revert)(\\(.+\\))?!?: .{1,}$' {1} || (echo 'Commit message must follow Conventional Commits: type(scope): message' && exit 1)"
      fail_text: "Commit message must follow Conventional Commits format: type(scope): message"
