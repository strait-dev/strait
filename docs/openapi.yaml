                    format: double
        '400':
          description: No project context

  /v1/events/{eventKey}:
    get:
      tags:
        - EventTriggers
      summary: Get event trigger by key
      description: Returns a single event trigger by its globally unique event key.
      parameters:
        - name: eventKey
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Event trigger details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventTrigger'
        '404':
          description: Event trigger not found
    delete:
      tags:
        - EventTriggers
      summary: Cancel a waiting event trigger
      description: |
        Cancels a waiting event trigger by key. The associated workflow step is failed
        (respecting on_failure policy) or the job run is canceled.
      parameters:
        - name: eventKey
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Event trigger canceled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventTrigger'
        '403':
          description: Trigger does not belong to project
        '404':
          description: Event trigger not found
        '409':
          description: Event trigger is not in waiting state

  /v1/events/{eventKey}/stream:
    get:
      tags:
        - EventTriggers
      summary: Stream event trigger status updates via SSE
      description: |
        Opens a Server-Sent Events stream for a specific event trigger.
        Sends the current state immediately, then streams status changes
        until the trigger reaches a terminal state.
      parameters:
        - name: eventKey
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: SSE stream of trigger status updates
          content:
            text/event-stream:
              schema:
                type: string
        '404':
          description: Event trigger not found

  /v1/events/{eventKey}/send:
    post:
      tags:
        - EventTriggers
      summary: Send an event to a waiting trigger
      description: |
        Delivers an event payload to a waiting trigger. The trigger transitions to 'received'
        and the associated workflow step is completed or job run is re-queued.

        Event keys are globally unique. Recommended patterns:
        - Workflow steps: `{domain}:{entity_id}` — e.g., `aml-check:app-456`
        - SDK runs: `{service}:{correlation_id}` — e.g., `payment:order-789`
        - Per-execution uniqueness: include `{{workflow_run_id}}` in the template
      parameters:
        - name: eventKey
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendEventRequest'
      responses:
        '200':
          description: Event received and trigger updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventTrigger'
        '404':
          description: No waiting trigger found for this key
        '409':
          description: Trigger already received or timed out

  /v1/events/prefix/{prefix}/send:
    post:
      tags:
        - EventTriggers
      summary: Send an event to all waiting triggers matching a prefix
      description: |
        Delivers an event payload to all waiting triggers whose event_key starts
        with the given prefix. Each matched trigger is resolved individually.
        Results are scoped to the authenticated project when using API key auth.
        Returns up to 1000 matching triggers per request.
      parameters:
        - name: prefix
          in: path
          required: true
          schema:
            type: string
            maxLength: 512
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendEventRequest'
      responses:
        '200':
          description: Events resolved
          content:
            application/json:
              schema:
                type: object
                properties:
                  resolved:
                    type: integer
                    description: Number of triggers resolved
                  triggers:
                    type: array
                    items:
                      $ref: '#/components/schemas/EventTrigger'
        '400':
          description: Invalid or empty prefix

  /v1/events/purge:
    post:
      tags:
        - EventTriggers
      summary: Purge terminal event triggers
      description: |
        Deletes event triggers in terminal state (received, timed_out, canceled)
        older than the specified number of days. Use dry_run to preview.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - older_than_days
              properties:
                older_than_days:
                  type: integer
                  minimum: 1
                  description: Delete triggers older than N days
                dry_run:
                  type: boolean
                  default: false
                  description: Preview without deleting
      responses:
        '200':
          description: Purge result
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
                  dry_run:
                    type: boolean
                  would_delete:
                    type: integer

