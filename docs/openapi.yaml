components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    runToken:
      type: http
      scheme: bearer
      description: JWT run token issued by the trigger response.

  schemas:
    Job:
      type: object
      properties:
        id:
          type: string
        project_id:
          type: string
        group_id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        cron:
          type: string
        payload_schema:
          type: object
        tags:
          type: object
          additionalProperties:
            type: string
        endpoint_url:
          type: string
        fallback_endpoint_url:
          type: string
        max_attempts:
          type: integer
        timeout_secs:
          type: integer
        max_concurrency:
          type: integer
        execution_window_cron:
          type: string
        timezone:
          type: string
        rate_limit_max:
          type: integer
        rate_limit_window_secs:
          type: integer
        dedup_window_secs:
          type: integer
        enabled:
          type: boolean
        webhook_url:
          type: string
        webhook_secret:
          type: string
        run_ttl_secs:
          type: integer
        retry_strategy:
          type: string
        retry_delays_secs:
          type: array
          items:
            type: integer
        environment_id:
          type: string
        version:
          type: integer
        version_id:
          type: string
          description: Nanoid-based public version identifier (e.g. ver_k8f2m9x1p3)
        version_policy:
          type: string
          enum: [pin, latest]
        backwards_compatible:
          type: boolean
        created_by:
          type: string
        updated_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    JobVersion:
      type: object
      properties:
        id:
          type: string
        job_id:
          type: string
        version:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        cron:
          type: string
        payload_schema:
          type: object
        tags:
          type: object
          additionalProperties:
            type: string
        endpoint_url:
          type: string
        fallback_endpoint_url:
          type: string
        max_attempts:
          type: integer
        timeout_secs:
          type: integer
        webhook_url:
          type: string
        webhook_secret:
          type: string
        run_ttl_secs:
          type: integer
        created_at:
          type: string
          format: date-time

    JobRun:
      type: object
      properties:
        id:
          type: string
        job_id:
          type: string
        project_id:
          type: string
        status:
          $ref: '#/components/schemas/RunStatus'
        attempt:
          type: integer
        payload:
          type: object
        result:
          type: object
        metadata:
          type: object
          additionalProperties:
            type: string
        error:
          type: string
        triggered_by:
          type: string
        scheduled_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        heartbeat_at:
          type: string
          format: date-time
        next_retry_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        parent_run_id:
          type: string
        priority:
          type: integer
        idempotency_key:
          type: string
        job_version:
          type: integer
        workflow_step_run_id:
          type: string
        max_attempts_override:
          type: integer
        timeout_secs_override:
          type: integer
        retry_backoff:
          type: string
        retry_initial_delay_secs:
          type: integer
        retry_max_delay_secs:
          type: integer
        execution_trace:
          $ref: '#/components/schemas/ExecutionTrace'
        debug_mode:
          type: boolean
        continuation_of:
          type: string
        lineage_depth:
          type: integer
        tags:
          type: object
          additionalProperties:
            type: string
        job_version_id:
          type: string
        created_by:
          type: string
        created_at:
          type: string
          format: date-time

    RunStatus:
      type: string
      enum:
        - delayed
        - queued
        - dequeued
        - executing
        - waiting
        - completed
        - failed
        - timed_out
        - crashed
        - system_failed
        - canceled
        - expired
        - dead_letter

    ExecutionTrace:
      type: object
      properties:
        queue_wait_ms:
          type: integer
        dequeue_ms:
          type: integer
        connect_ms:
          type: integer
        ttfb_ms:
          type: integer
        transfer_ms:
          type: integer
        total_ms:
          type: integer
        dispatch_ms:
          type: integer

    Workflow:
      type: object
      properties:
        id:
          type: string
        project_id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        enabled:
          type: boolean
        version:
          type: integer
        timeout_secs:
          type: integer
        max_concurrent_runs:
          type: integer
        max_parallel_steps:
          type: integer
        cron:
          type: string
        cron_timezone:
          type: string
        skip_if_running:
          type: boolean
        tags:
          type: object
          additionalProperties:
            type: string
        version_id:
          type: string
        version_policy:
          type: string
          enum: [pin, latest]
        backwards_compatible:
          type: boolean
        created_by:
          type: string
        updated_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WorkflowRun:
      type: object
      properties:
        id:
          type: string
        workflow_id:
          type: string
        project_id:
          type: string
        status:
          $ref: '#/components/schemas/WorkflowRunStatus'
        triggered_by:
          type: string
        workflow_version:
          type: integer
        max_parallel_steps:
          type: integer
        payload:
          type: object
        error:
          type: string
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        retry_of_run_id:
          type: string
        parent_workflow_run_id:
          type: string
        tags:
          type: object
          additionalProperties:
            type: string
        workflow_version_id:
          type: string
        created_by:
          type: string
        created_at:
          type: string
          format: date-time

    WorkflowRunStatus:
      type: string
      enum:
        - pending
        - running
        - paused
        - completed
        - failed
        - timed_out
        - canceled

    WorkflowStepRun:
      type: object
      properties:
        id:
          type: string
        workflow_run_id:
          type: string
        workflow_step_id:
          type: string
        step_ref:
          type: string
        job_run_id:
          type: string
        attempt:
          type: integer
        status:
          $ref: '#/components/schemas/StepRunStatus'
        deps_completed:
          type: integer
        deps_required:
          type: integer
        output:
          type: object
        error:
          type: string
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    StepRunStatus:
      type: string
      enum:
        - pending
        - waiting
        - running
        - completed
        - failed
        - skipped
        - canceled

    JobGroup:
      type: object
      properties:
        id:
          type: string
        project_id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        created_at:
          type: string
          format: date-time
