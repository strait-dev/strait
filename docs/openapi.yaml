openapi: 3.0.3
info:
  title: Strait API
  version: 1.0.0
  description: A production-grade Go job orchestration service API.
servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Health
    description: Health check and metrics endpoints
  - name: Jobs
    description: Job management and triggering
  - name: JobGroups
    description: Grouping jobs for organization
  - name: Environments
    description: Environment-specific configuration and variables
  - name: Runs
    description: Job run management and monitoring
  - name: Workflows
    description: Workflow DAG definition and management
  - name: WorkflowRuns
    description: Workflow execution management
  - name: APIKeys
    description: Project-level API key management
  - name: Stats
    description: Queue and system statistics
  - name: Analytics
    description: Performance analytics insights
  - name: Secrets
    description: Job and environment secret management
  - name: EventTriggers
    description: External event trigger management for durable waits
  - name: SDK
    description: Endpoints called by job executors using run tokens
  - name: BatchOperations
    description: Batch operation tracking for bulk triggers
  - name: LogDrains
    description: External log drain configuration and management
  - name: EventSources
    description: Inbound event source and subscription management

paths:
  /health:
    get:
      tags:
        - Health
      summary: Liveness check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /health/ready:
    get:
      tags:
        - Health
      summary: Readiness check
      description: |
        Returns per-component health status. Status is "up" when all components are healthy,
        "degraded" when non-critical components (Redis, Sequin) are down but database is up,
        or "down" when critical components (database) are unreachable.
        Returns 200 for "up" and "degraded", 503 for "down".
      responses:
        '200':
          description: Healthy or degraded
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [up, degraded]
                  components:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        status:
                          type: string
                          enum: [up, down]
                        latency_ms:
                          type: integer
                        error:
                          type: string
        '503':
          description: Critical component down
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [down]
                  components:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        status:
                          type: string
                          enum: [up, down]
                        latency_ms:
                          type: integer
                        error:
                          type: string

  /metrics:
    get:
      tags:
        - Health
      summary: Prometheus metrics
      responses:
        '200':
          description: Prometheus metrics in text format
          content:
            text/plain:
              schema:
                type: string

  /v1/regions:
    get:
      tags:
        - Regions
      summary: List available regions
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: List of available regions
          content:
            application/json:
              schema:
                type: object
                properties:
                  regions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Region'

  /v1/projects/{projectID}/settings:
    get:
      tags:
        - Projects
      summary: Get project settings
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: projectID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Project settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectSettings'
    put:
      tags:
        - Projects
      summary: Update project settings
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: projectID
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                default_region:
                  type: string
      responses:
        '200':
          description: Updated project settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectSettings'

  /v1/jobs:
    get:
      tags:
        - Jobs
      summary: List jobs
      security:
        - bearerAuth: []
      parameters:
        - name: project_id
          in: query
          required: true
          schema:
            type: string
        - name: tag_key
          in: query
          schema:
            type: string
        - name: tag_value
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Job'
    post:
      tags:
        - Jobs
      summary: Create a job
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateJobRequest'
      responses:
        '201':
          description: Job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'

  /v1/jobs/batch:
    post:
      tags:
        - Jobs
      summary: Batch create jobs
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CreateJobRequest'
      responses:
        '201':
          description: Jobs created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Job'

  /v1/jobs/batch-enable:
    post:
      tags:
        - Jobs
      summary: Batch enable jobs
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                job_ids:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Jobs enabled

  /v1/jobs/batch-disable:
    post:
      tags:
        - Jobs
      summary: Batch disable jobs
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                job_ids:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Jobs disabled

  /v1/jobs/{jobID}:
    get:
      tags:
        - Jobs
      summary: Get a job
      security:
        - bearerAuth: []
      parameters:
        - name: jobID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
    patch:
      tags:
        - Jobs
      summary: Update a job
      security:
        - bearerAuth: []
      parameters:
        - name: jobID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateJobRequest'
      responses:
        '200':
          description: Job updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
    delete:
      tags:
        - Jobs
      summary: Delete a job
      security:
        - bearerAuth: []
      parameters:
        - name: jobID
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Job deleted

  /v1/jobs/{jobID}/trigger:
    post:
      tags:
        - Jobs
      summary: Trigger a job run
      description: Rate limited to 10 requests per minute.
      security:
        - bearerAuth: []
      parameters:
        - name: jobID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TriggerJobRequest'
      responses:
        '202':
          description: Run triggered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobRun'

  /v1/jobs/{jobID}/trigger/bulk:
    post:
      tags:
        - Jobs
      summary: Trigger multiple runs
      description: Rate limited to 30 requests per minute.
      security:
        - bearerAuth: []
      parameters:
        - name: jobID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkTriggerRequest'
      responses:
        '201':
          description: Bulk trigger results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkTriggerResponse'

  /v1/jobs/{jobID}/versions:
    get:
      tags:
        - Jobs
      summary: List job versions
      security:
        - bearerAuth: []
      parameters:
        - name: jobID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of job versions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JobVersion'

  /v1/jobs/{jobID}/clone:
    post:
      tags:
        - Jobs
      summary: Clone a job
      security:
        - bearerAuth: []
      parameters:
        - name: jobID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                slug:
                  type: string
      responses:
        '201':
          description: Job cloned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'

  /v1/jobs/{jobID}/health:
    get:
      tags:
        - Jobs
      summary: Get job health score
      security:
        - bearerAuth: []
      parameters:
        - name: jobID
          in: path
          required: true
          schema:
            type: string
        - name: window
          in: query
          schema:
            type: string
            default: 7d
      responses:
        '200':
          description: Job health stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobHealthStats'

  /v1/jobs/{jobID}/dependencies:
    get:
      tags:
        - Jobs
      summary: List job dependencies
      security:
        - bearerAuth: []
      parameters:
        - name: jobID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of dependencies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JobDependency'
    post:
      tags:
        - Jobs
      summary: Create a job dependency
      security:
        - bearerAuth: []
      parameters:
        - name: jobID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                depends_on_job_id:
                  type: string
                condition:
                  type: string
      responses:
        '201':
          description: Dependency created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobDependency'

  /v1/jobs/{jobID}/dependencies/{depID}:
    delete:
      tags:
        - Jobs
      summary: Delete a job dependency
      security:
        - bearerAuth: []
      parameters:
        - name: jobID
          in: path
          required: true
          schema:
            type: string
        - name: depID
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Dependency deleted

  /v1/job-groups:
    get:
      tags:
        - JobGroups
      summary: List job groups
      security:
        - bearerAuth: []
      parameters:
        - name: project_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of job groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JobGroup'
    post:
      tags:
        - JobGroups
      summary: Create a job group
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateJobGroupRequest'
      responses:
        '201':
          description: Job group created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobGroup'

  /v1/job-groups/{groupID}:
    get:
      tags:
        - JobGroups
      summary: Get a job group
      security:
        - bearerAuth: []
      parameters:
        - name: groupID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job group details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobGroup'
    patch:
      tags:
        - JobGroups
      summary: Update a job group
      security:
        - bearerAuth: []
      parameters:
        - name: groupID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateJobGroupRequest'
      responses:
        '200':
          description: Job group updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobGroup'
    delete:
      tags:
        - JobGroups
      summary: Delete a job group
      security:
        - bearerAuth: []
      parameters:
        - name: groupID
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Job group deleted

  /v1/job-groups/{groupID}/jobs:
    get:
      tags:
        - JobGroups
      summary: List jobs in a group
      security:
        - bearerAuth: []
      parameters:
        - name: groupID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Job'

  /v1/job-groups/{groupID}/pause-all:
    post:
      tags:
        - JobGroups
      summary: Pause all jobs in a group
      security:
        - bearerAuth: []
      parameters:
        - name: groupID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: All jobs in group paused

  /v1/job-groups/{groupID}/resume-all:
    post:
      tags:
        - JobGroups
      summary: Resume all jobs in a group
      security:
        - bearerAuth: []
      parameters:
        - name: groupID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: All jobs in group resumed

  /v1/job-groups/{groupID}/stats:
    get:
      tags:
        - JobGroups
      summary: Get aggregate run stats for a job group
      security:
        - bearerAuth: []
      parameters:
        - name: groupID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Aggregate run counts by status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobGroupStats'

  /v1/environments:
    get:
      tags:
        - Environments
      summary: List environments
      security:
        - bearerAuth: []
      parameters:
        - name: project_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of environments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Environment'
    post:
      tags:
        - Environments
      summary: Create an environment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEnvironmentRequest'
      responses:
        '201':
          description: Environment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Environment'

  /v1/environments/{envID}:
    get:
      tags:
        - Environments
      summary: Get an environment
      security:
        - bearerAuth: []
      parameters:
        - name: envID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Environment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Environment'
    patch:
      tags:
        - Environments
      summary: Update an environment
      security:
        - bearerAuth: []
      parameters:
        - name: envID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEnvironmentRequest'
      responses:
        '200':
          description: Environment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Environment'
    delete:
      tags:
        - Environments
      summary: Delete an environment
      security:
        - bearerAuth: []
      parameters:
        - name: envID
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Environment deleted

  /v1/environments/{envID}/variables:
    get:
      tags:
        - Environments
      summary: Get resolved variables
      security:
        - bearerAuth: []
      parameters:
        - name: envID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Resolved variables
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string

  /v1/runs:
    get:
      tags:
        - Runs
      summary: List runs
      security:
        - bearerAuth: []
      parameters:
        - name: project_id
          in: query
          required: true
          schema:
            type: string
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/RunStatus'
        - name: metadata_key
          in: query
          schema:
            type: string
        - name: metadata_value
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: cursor
          in: query
          schema:
            type: string
            format: date-time
        - name: triggered_by
          in: query
          schema:
            type: string
          description: Filter by trigger source (manual, cron, spawn, workflow, retry, event)
        - name: batch_id
          in: query
          schema:
            type: string
          description: Filter runs by batch operation ID
        - name: payload_contains
          in: query
          schema:
            type: string
          description: JSON object for JSONB containment filter on run payload
      responses:
        '200':
          description: List of runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JobRun'

  /v1/runs/dlq:
    get:
      tags:
        - Runs
      summary: List dead-lettered runs
      security:
        - bearerAuth: []
      parameters:
        - name: project_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of dead-lettered runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JobRun'

  /v1/runs/bulk-cancel:
    post:
      tags:
        - Runs
      summary: Cancel multiple runs
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                run_ids:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Bulk cancel results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkCancelResponse'
  /v1/runs/{runID}:
    get:
      tags:
        - Runs
      summary: Get a run
      security:
        - bearerAuth: []
      parameters:
        - name: runID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Run details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobRun'
    delete:
      tags:
        - Runs
      summary: Cancel a run
      security:
        - bearerAuth: []
      parameters:
        - name: runID
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Run canceled

  /v1/runs/{runID}/replay:
    post:
      tags:
        - Runs
      summary: Replay a failed run
      security:
        - bearerAuth: []
      parameters:
        - name: runID
          in: path
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Run replayed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobRun'

  /v1/runs/{runID}/dlq-replay:
    post:
      tags:
        - Runs
      summary: Replay a dead-lettered run
      security:
        - bearerAuth: []
      parameters:
        - name: runID
          in: path
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Run replayed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobRun'

  /v1/runs/bulk-dlq-replay:
    post:
      tags:
        - Runs
      summary: Bulk replay dead-lettered runs
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkDLQReplayRequest'
      responses:
        '200':
          description: Runs replayed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkDLQReplayResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: No eligible dead-letter runs to replay
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/runs/bulk-cancel-all:
    post:
      tags:
        - Runs
      summary: Cancel all runs matching filters
      security:
        - bearerAuth: []
      parameters:
        - name: project_id
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkCancelAllRequest'
      responses:
        '200':
          description: Bulk cancel results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkCancelResponse'

  /v1/runs/bulk-replay:
    post:
      tags:
        - Runs
      summary: Replay multiple runs by ID
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - run_ids
              properties:
                run_ids:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Replayed runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JobRun'

  /v1/runs/{runID}/stream:
    get:
      tags:
        - Runs
      summary: SSE event stream
      security:
        - bearerAuth: []
      parameters:
        - name: runID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

  /v1/runs/{runID}/children:
    get:
      tags:
        - Runs
      summary: List child runs
      security:
        - bearerAuth: []
      parameters:
        - name: runID
          in: path
