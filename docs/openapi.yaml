components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    runToken:
      type: http
      scheme: bearer
      description: JWT run token issued by the trigger response.

  schemas:
    EventTrigger:
      type: object
      properties:
        id:
          type: string
        event_key:
          type: string
          description: Globally unique event key. Supports template variables from workflow payload.
        project_id:
          type: string
        source_type:
          type: string
          enum: [workflow_step, job_run]
        workflow_run_id:
          type: string
          nullable: true
        workflow_step_run_id:
          type: string
          nullable: true
        job_run_id:
          type: string
          nullable: true
        status:
          type: string
          enum: [waiting, received, timed_out, canceled]
        request_payload:
          type: object
          nullable: true
        response_payload:
          type: object
          nullable: true
        timeout_secs:
          type: integer
        requested_at:
          type: string
          format: date-time
        received_at:
          type: string
          format: date-time
          nullable: true
        expires_at:
          type: string
          format: date-time
        error:
          type: string
          nullable: true

    SendEventRequest:
      type: object
      properties:
        payload:
          type: object
          nullable: true
          description: Optional payload to deliver to the waiting trigger.

    SDKWaitForEventRequest:
      type: object
      required:
        - event_key
      properties:
        event_key:
          type: string
          description: Globally unique key for the event trigger.
        timeout_secs:
          type: integer
          default: 3600
          description: Timeout in seconds before the trigger expires.
        notify_url:
          type: string
          format: uri
          description: Optional webhook URL to notify when the event trigger is created.

    Job:
      type: object
      properties:
        id:
          type: string
        project_id:
          type: string
        group_id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        cron:
          type: string
        payload_schema:
          type: object
        tags:
          type: object
          additionalProperties:
            type: string
        endpoint_url:
          type: string
        fallback_endpoint_url:
          type: string
        max_attempts:
          type: integer
        timeout_secs:
          type: integer
        max_concurrency:
          type: integer
        execution_window_cron:
          type: string
        timezone:
          type: string
        rate_limit_max:
          type: integer
        rate_limit_window_secs:
          type: integer
        max_concurrency_per_key:
          type: integer
          description: Per-key concurrency limit for runs with matching concurrency_key
        rate_limit_keys:
          type: array
          items:
            $ref: '#/components/schemas/RateLimitKey'
        default_run_metadata:
          type: object
          additionalProperties:
            type: string
          description: Default metadata applied to every run created for this job
        dedup_window_secs:
          type: integer
        enabled:
          type: boolean
        webhook_url:
          type: string
        webhook_secret:
          type: string
        run_ttl_secs:
          type: integer
        retry_strategy:
          type: string
        retry_delays_secs:
          type: array
          items:
            type: integer
        environment_id:
          type: string
        version:
          type: integer
        version_id:
          type: string
          description: Nanoid-based public version identifier (e.g. ver_k8f2m9x1p3)
        version_policy:
          type: string
          enum: [pin, latest, minor]
        backwards_compatible:
          type: boolean
        created_by:
          type: string
        updated_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    JobVersion:
      type: object
      properties:
        id:
          type: string
        job_id:
          type: string
        version:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        cron:
          type: string
        payload_schema:
          type: object
        tags:
          type: object
          additionalProperties:
            type: string
        endpoint_url:
          type: string
        fallback_endpoint_url:
          type: string
        max_attempts:
          type: integer
        timeout_secs:
          type: integer
        webhook_url:
          type: string
        webhook_secret:
          type: string
        run_ttl_secs:
          type: integer
        created_at:
          type: string
          format: date-time

    JobRun:
      type: object
      properties:
        id:
          type: string
        job_id:
          type: string
        project_id:
          type: string
        status:
          $ref: '#/components/schemas/RunStatus'
        attempt:
          type: integer
        payload:
          type: object
        result:
          type: object
        metadata:
          type: object
          additionalProperties:
            type: string
        error:
          type: string
        triggered_by:
          type: string
        scheduled_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        heartbeat_at:
          type: string
          format: date-time
        next_retry_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        parent_run_id:
          type: string
        priority:
          type: integer
        idempotency_key:
          type: string
        job_version:
          type: integer
        workflow_step_run_id:
          type: string
        max_attempts_override:
          type: integer
        timeout_secs_override:
          type: integer
        retry_backoff:
          type: string
        retry_initial_delay_secs:
          type: integer
        retry_max_delay_secs:
          type: integer
        execution_trace:
          $ref: '#/components/schemas/ExecutionTrace'
        debug_mode:
          type: boolean
        continuation_of:
          type: string
        lineage_depth:
          type: integer
        tags:
          type: object
          additionalProperties:
            type: string
        job_version_id:
          type: string
        created_by:
          type: string
        batch_id:
          type: string
          description: Reference to the batch operation that created this run
        concurrency_key:
          type: string
          description: Key used for per-key concurrency limiting
        created_at:
          type: string
          format: date-time

    RunStatus:
      type: string
      enum:
        - delayed
        - queued
        - dequeued
        - executing
        - waiting
        - completed
        - failed
        - timed_out
        - crashed
        - system_failed
        - canceled
        - expired
        - dead_letter

    ExecutionTrace:
      type: object
      properties:
        queue_wait_ms:
          type: integer
        dequeue_ms:
          type: integer
        connect_ms:
          type: integer
        ttfb_ms:
          type: integer
        transfer_ms:
          type: integer
        total_ms:
          type: integer
        dispatch_ms:
          type: integer

    JobDependency:
      type: object
      properties:
        id:
          type: string
        job_id:
          type: string
        depends_on_job_id:
          type: string
        condition:
          type: string
        created_at:
          type: string
          format: date-time

    Workflow:
      type: object
      properties:
        id:
          type: string
        project_id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        enabled:
          type: boolean
        version:
          type: integer
        timeout_secs:
          type: integer
        max_concurrent_runs:
          type: integer
        max_parallel_steps:
          type: integer
        cron:
          type: string
        cron_timezone:
          type: string
        skip_if_running:
          type: boolean
        tags:
          type: object
          additionalProperties:
            type: string
        version_id:
          type: string
        version_policy:
          type: string
          enum: [pin, latest, minor]
        backwards_compatible:
          type: boolean
        created_by:
          type: string
        updated_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WorkflowRun:
      type: object
      properties:
        id:
          type: string
        workflow_id:
          type: string
        project_id:
          type: string
        status:
          $ref: '#/components/schemas/WorkflowRunStatus'
        triggered_by:
          type: string
        workflow_version:
          type: integer
        max_parallel_steps:
          type: integer
        payload:
          type: object
        error:
          type: string
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        retry_of_run_id:
          type: string
        parent_workflow_run_id:
          type: string
        parent_step_run_id:
          type: string
        tags:
          type: object
          additionalProperties:
            type: string
        workflow_version_id:
          type: string
        created_by:
          type: string
        created_at:
          type: string
          format: date-time

    WorkflowRunStatus:
      type: string
      enum:
        - pending
        - running
        - paused
        - completed
        - failed
        - timed_out
        - canceled

    WorkflowStepRun:
      type: object
      properties:
        id:
          type: string
        workflow_run_id:
          type: string
        workflow_step_id:
          type: string
        step_ref:
          type: string
        job_run_id:
          type: string
        attempt:
          type: integer
        status:
          $ref: '#/components/schemas/StepRunStatus'
        deps_completed:
          type: integer
        deps_required:
          type: integer
        output:
          type: object
        error:
          type: string
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    StepRunStatus:
      type: string
      enum:
        - pending
        - waiting
        - running
        - completed
        - failed
        - skipped
        - canceled

    WorkflowRunLabels:
      type: object
      additionalProperties:
        type: string

    WorkflowRunLabelsResponse:
      type: object
      required: [labels]
      properties:
        labels:
          $ref: '#/components/schemas/WorkflowRunLabels'

    WorkflowRunGraphEdge:
      type: object
      required: [from, to]
      properties:
        from:
          type: string
        to:
          type: string

    WorkflowRunGraphNode:
      type: object
      properties:
        step_ref:
          type: string
        type:
          type: string
          enum: [job, approval, sub_workflow, wait_for_event, sleep]
        status:
          $ref: '#/components/schemas/StepRunStatus'
        depends_on:
          type: array
          items:
            type: string
        attempt:
          type: integer
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        duration_ms:
          type: integer
          format: int64

    WorkflowRunGraphResponse:
      type: object
      properties:
        workflow_run_id:
          type: string
        workflow_id:
          type: string
        version:
          type: integer
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowRunGraphNode'
        edges:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowRunGraphEdge'
        roots:
          type: array
          items:
            type: string
        runnable:
          type: array
          items:
            type: string
        critical_path:
          type: array
          items:
            type: string
        critical_path_estimate_ms:
          type: integer
          format: int64
        critical_path_remaining_ms:
          type: integer
          format: int64

    TimelineStep:
      type: object
      properties:
        step_run_id:
          type: string
        step_ref:
          type: string
        status:
          type: string
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        duration_ms:
          type: integer
          format: int64
        parallel_with:
          type: array
          items:
            type: string
        on_critical_path:
          type: boolean
        wait_ms:
          type: integer
          format: int64

    TimelineResponse:
      type: object
      properties:
        workflow_run_id:
          type: string
        status:
          type: string
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        total_ms:
          type: integer
          format: int64
        steps:
          type: array
          items:
            $ref: '#/components/schemas/TimelineStep'

    WorkflowStepDecision:
      type: object
      properties:
        id:
          type: string
        workflow_run_id:
          type: string
        step_run_id:
          type: string
        step_ref:
          type: string
        decision_type:
          type: string
          enum: [scheduler, concurrency, resource, condition]
        decision:
          type: string
        explanation:
          type: string
        details:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time

    WorkflowStepDecisionListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowStepDecision'
        next_cursor:
          type: string
        has_more:
          type: boolean

    RetryWorkflowStepResponse:
      type: object
      properties:
        step_run:
          allOf:
            - $ref: '#/components/schemas/WorkflowStepRun'
          nullable: true

    ReplayWorkflowSubtreeResponse:
      type: object
      properties:
        reset_steps:
          type: integer

    WorkflowSimulationResponse:
      type: object
      properties:
        workflow_id:
          type: string
        version:
          type: integer
        predicted_order:
          type: array
          items:
            type: string
        step_count:
          type: integer

    WorkflowVersionDiffResponse:
      type: object
      properties:
        from_version_id:
          type: string
        to_version_id:
          type: string
        added_steps:
          type: array
          items:
            type: string
        removed_steps:
          type: array
          items:
            type: string

    WorkflowVersionImpactResponse:
      type: object
      properties:
        version_id:
          type: string
        matching_runs:
          type: integer
        sampled_runs:
          type: integer

    WorkflowPolicyUpsertRequest:
      type: object
      properties:
        max_fan_out:
          type: integer
        max_depth:
          type: integer
        forbidden_step_types:
          type: array
