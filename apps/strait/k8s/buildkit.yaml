# BuildKit daemon infrastructure for code-first job builds.
#
# BuildKit runs as a StatefulSet with a PVC for persistent layer cache.
# Builds submitted by the Strait API server are executed here and the
# resulting image is pushed to ECR (or a generic registry).
#
# Namespace: strait-build (isolated from the job execution namespace)
# See buildkit-network-policy.yaml for egress/ingress restrictions.
---
apiVersion: v1
kind: Namespace
metadata:
  name: strait-build
  labels:
    kubernetes.io/metadata.name: strait-build
    app.kubernetes.io/managed-by: argocd
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: buildkitd
  namespace: strait-build
  annotations:
    # Bind to an IAM role with ECR push permissions (cloud edition).
    # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT:role/strait-buildkit
---
# Persistent volume for BuildKit layer cache.
# 100Gi provides ~20-30 cached builds depending on image sizes.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: buildkit-cache
  namespace: strait-build
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
  storageClassName: hcloud-volumes
---
apiVersion: v1
kind: Service
metadata:
  name: buildkitd
  namespace: strait-build
  labels:
    app: buildkitd
spec:
  selector:
    app: buildkitd
  ports:
    - name: grpc
      port: 1234
      targetPort: 1234
      protocol: TCP
  type: ClusterIP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: buildkitd
  namespace: strait-build
  labels:
    app: buildkitd
    app.kubernetes.io/name: buildkitd
    app.kubernetes.io/component: build-daemon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: buildkitd
  serviceName: buildkitd
  template:
    metadata:
      labels:
        app: buildkitd
        app.kubernetes.io/name: buildkitd
    spec:
      serviceAccountName: buildkitd
      # BuildKit requires privilege escalation for rootless mode or seccomp override.
      # We use rootless BuildKit with a custom seccomp profile (see seccompProfile below).
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: buildkitd
          image: moby/buildkit:v0.18-rootless
          args:
            - --addr=tcp://0.0.0.0:1234
            - --oci-worker-no-process-sandbox
          env:
            - name: BUILDKITD_FLAGS
              value: "--oci-worker-no-process-sandbox"
          ports:
            - name: grpc
              containerPort: 1234
          securityContext:
            seccompProfile:
              type: Localhost
              localhostProfile: profiles/buildkit.json
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - SETUID
                - SETGID
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          readinessProbe:
            exec:
              command:
                - buildctl
                - debug
                - workers
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - buildctl
                - debug
                - workers
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: cache
              mountPath: /home/user/.local/share/buildkit
            - name: run
              mountPath: /run/user/1000
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: buildkit-cache
        - name: run
          emptyDir:
            medium: Memory
  # Keep cache PVC across pod restarts.
  volumeClaimTemplates: []
