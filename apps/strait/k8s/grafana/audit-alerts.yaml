# Prometheus alert rules for the Strait audit subsystem.
#
# Load via Prometheus `rule_files:` or a PrometheusRule CRD in Kubernetes.
groups:
  - name: strait-audit
    interval: 30s
    rules:
      - alert: AuditDLQRising
        expr: rate(strait_audit_events_deadlettered_total[15m]) > 0
        for: 15m
        labels:
          severity: warning
          component: audit
        annotations:
          summary: "Audit deadletter queue is growing"
          description: |
            Audit events are spilling to the deadletter table faster than the
            reclaimer can drain them. Investigate `audit_deadletter` rows and
            reclaimer_failed_total{reason=...} for the underlying cause.

      - alert: AuditDrainerSaturated
        expr: strait_audit_drainer_queue_depth / strait_audit_drainer_queue_capacity > 0.9
        for: 5m
        labels:
          severity: warning
          component: audit
        annotations:
          summary: "Audit async drainer queue is saturated"
          description: |
            The audit async drain channel has been above 90% of its buffer
            capacity for five minutes. Emit throughput is outpacing the
            sequential drainer — expect dropped or deadlettered events if
            the trend continues. Investigate DB write latency and SIEM
            forwarder backpressure.

      - alert: AuditSIEMForwardFailing
        expr: increase(strait_audit_siem_circuit_open_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
          component: audit
        annotations:
          summary: "Audit SIEM forwarder circuit breaker opened"
          description: |
            The audit SIEM forwarder transitioned to the open state in the last
            five minutes. Check the destination endpoint health and
            strait_audit_siem_failed_total{reason=...} for the failure class.

      - alert: AuditChainVerificationFailed
        expr: increase(strait_audit_chain_verify_failed_total[5m]) > 0
        for: 0m
        labels:
          severity: critical
          component: audit
        annotations:
          summary: "Audit chain verification failed"
          description: |
            One or more audit chain verification attempts did not pass in
            the last five minutes. Either a verifier error occurred
            (reason=verifier_error) or HMAC linkage is broken
            (reason=chain_broken). Pull the originating project_id from
            the audit.chain_verified self-audit events and investigate
            the chain store before evidence drifts further.
