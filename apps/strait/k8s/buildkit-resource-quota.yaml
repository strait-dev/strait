# ResourceQuota and LimitRange for the strait-build namespace.
#
# Goals:
#   1. Cap the total CPU/memory a compromised build pod can consume.
#   2. Prevent a burst of builds from starving the rest of the cluster.
#   3. Enforce per-container defaults so pods without explicit requests/limits
#      are still bounded (guards against misconfigured build submissions).
#
# These quotas are sized for the Hetzner k3s cluster.
# Adjust storage.requests if the PVC size changes in buildkit.yaml.
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: buildkit-quota
  namespace: strait-build
  labels:
    app.kubernetes.io/component: security
    app.kubernetes.io/managed-by: argocd
spec:
  hard:
    # Compute limits across all pods in the namespace.
    requests.cpu: "8"
    requests.memory: "16Gi"
    limits.cpu: "16"
    limits.memory: "32Gi"

    # Storage: one PVC per StatefulSet replica (currently 1).
    requests.storage: "200Gi"
    persistentvolumeclaims: "4"

    # Object counts — prevent runaway pod/job creation.
    pods: "20"
    count/statefulsets.apps: "4"
    count/daemonsets.apps: "2"
    count/services: "8"
    count/configmaps: "16"
    count/secrets: "16"
---
# LimitRange enforces per-container defaults and caps.
# Without this, a pod that omits resource fields would be unbounded.
apiVersion: v1
kind: LimitRange
metadata:
  name: buildkit-limits
  namespace: strait-build
  labels:
    app.kubernetes.io/component: security
    app.kubernetes.io/managed-by: argocd
spec:
  limits:
    - type: Container
      default:
        cpu: "2"
        memory: "4Gi"
      defaultRequest:
        cpu: "500m"
        memory: "1Gi"
      max:
        cpu: "8"
        memory: "16Gi"
      min:
        cpu: "10m"
        memory: "32Mi"
    - type: Pod
      max:
        cpu: "8"
        memory: "16Gi"
    - type: PersistentVolumeClaim
      max:
        storage: "200Gi"
      min:
        storage: "1Gi"
