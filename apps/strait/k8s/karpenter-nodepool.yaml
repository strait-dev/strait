# Karpenter NodePool for EKS job nodes. Uses Graviton Spot instances.
# Not used in kind (local dev) -- Karpenter only runs on EKS.
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: strait-jobs
spec:
  template:
    spec:
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["c6g.medium", "c6g.large", "c6g.xlarge", "c7g.medium", "c7g.large"]
        - key: kubernetes.io/arch
          operator: In
          values: ["arm64"]
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: strait-jobs
  limits:
    cpu: "200"
    memory: "400Gi"
  disruption:
    consolidateAfter: 1h
