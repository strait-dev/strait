# Warm pool deployment for EKS. Not used in kind (local dev).
# Keeps N nodes provisioned with placeholder pods that get preempted by real jobs.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: warm-pool
  namespace: default
  labels:
    app: strait-warm-pool
spec:
  replicas: 10
  selector:
    matchLabels:
      app: strait-warm-pool
  template:
    metadata:
      labels:
        app: strait-warm-pool
    spec:
      priorityClassName: warm-pool
      terminationGracePeriodSeconds: 0
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.9
          resources:
            requests:
              cpu: "900m"
              memory: "1.5Gi"
            limits:
              cpu: "900m"
              memory: "1.5Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
