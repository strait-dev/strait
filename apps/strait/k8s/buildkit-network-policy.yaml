# NetworkPolicy for the BuildKit build daemon.
#
# Security model:
#   Ingress:  only from the strait namespace (API/worker pods submitting builds)
#   Egress:   DNS + HTTPS only (for pulling base images from registries and
#             pushing built images to ECR)
#
# This prevents build pods from reaching internal cluster services or
# other tenants' namespaces. Untrusted user code runs inside the BuildKit
# OCI worker, not as a separate K8s pod, so lateral movement via network
# is the primary threat we're defending against here.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: buildkitd-isolation
  namespace: strait-build
spec:
  podSelector:
    matchLabels:
      app: buildkitd
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Accept build requests only from the strait application namespace.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: strait
      ports:
        - port: 1234
          protocol: TCP
  egress:
    # DNS resolution.
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # HTTPS: pulling base images + pushing to ECR / generic registries.
    - ports:
        - port: 443
          protocol: TCP
    # HTTP fallback for local/development registries (e.g. a cluster-internal Harbor).
    - ports:
        - port: 80
          protocol: TCP
    # Direct ECR endpoint port (redundant with 443 but explicit for clarity).
    - ports:
        - port: 5000
          protocol: TCP
