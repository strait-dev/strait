# Local development overrides for the shared Strait runtime.
# Run from the repo root:
#   docker compose -f docker-compose.base.yml -f apps/strait/docker-compose.yml --profile core up --build --wait -d

services:
  postgres:
    ports:
      - "15432:5432"

  redis:
    ports:
      - "16379:6379"

  sequin:
    ports:
      - "7376:7376"

  strait-migrate:
    build:
      context: ./apps/strait
    image: strait-dev-local:latest
    environment:
      STRAIT_ENV: development

  strait:
    build:
      context: ./apps/strait
    image: strait-dev-local:latest
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      STRAIT_ENV: development
      ALLOW_PRIVATE_ENDPOINTS: "true"
      LOG_FORMAT: text

  postgres-debug:
    profiles: ["debug"]
    container_name: strait-postgres-debug
    image: adminer:4
    restart: unless-stopped
    ports:
      - "18080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  redis-debug:
    profiles: ["debug"]
    container_name: strait-redis-debug
    image: redis/redisinsight:latest
    restart: unless-stopped
    ports:
      - "15540:5540"
    depends_on:
      redis:
        condition: service_healthy
