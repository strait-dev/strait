# Local development infrastructure for Strait.
#
# This starts the required Strait runtime: Postgres, Redis, Sequin, and Strait.
#
# Ports use non-standard host mappings (15432, 16379) to avoid
name: strait

services:
  postgres:
    container_name: strait-postgres
    image: postgres:18-alpine
    restart: unless-stopped
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: strait
      POSTGRES_PASSWORD: strait
      POSTGRES_DB: strait
    volumes:
      # Postgres 18+ stores data under a major-version subdirectory
      # (e.g. /var/lib/postgresql/18/docker), so the volume mounts at
      # /var/lib/postgresql rather than /var/lib/postgresql/data. See
      # https://github.com/docker-library/postgres/pull/1259.
      - pgdata:/var/lib/postgresql
      - ../../packages/configs/postgres-init.sql:/docker-entrypoint-initdb.d/01-sequin.sql:ro
    command: >
      postgres
      -c wal_level=logical
      -c max_replication_slots=10
      -c max_wal_senders=10
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strait -d strait"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "2.0"

  redis:
    container_name: strait-redis
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1.0"

  sequin:
    container_name: strait-sequin
    image: sequin/sequin:v0.14.6
    restart: unless-stopped
    ports:
      - "7376:7376"
    environment:
      PG_HOSTNAME: postgres
      PG_PORT: "5432"
      PG_USERNAME: strait
      PG_PASSWORD: strait
      PG_DATABASE: strait
      REDIS_URL: redis://redis:6379
      # Dev-only hardcoded secrets. Do NOT use in production.
      # Self-host generates random values via selfhost-init.sh.
      SECRET_KEY_BASE: "tONJRnB3NMPNPSbvLsKzE/r6lklVO+04MfFNWPBzBtBt2G5H0rrn8bwdHcRXiSQ3"
      VAULT_KEY: "Gw1VfMPCshBaUeXrOvIPFTVtW/d5xlv93F7BPfVo7Ys="
      CONFIG_FILE_PATH: /etc/sequin/config.yml
    volumes:
      - ../../packages/configs/sequin.yml:/etc/sequin/config.yml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      strait-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7376/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  strait-migrate:
    container_name: strait-migrate
    build:
      context: .
    restart: "no"
    command: ["migrate", "up"]
    environment:
      DATABASE_URL: postgres://strait:strait@postgres:5432/strait?sslmode=disable
      REDIS_URL: redis://redis:6379
      SEQUIN_BASE_URL: http://sequin:7376
      SEQUIN_CONSUMER_NAME: strait-cdc
      INTERNAL_SECRET: local-dev-internal-secret-change-me
      JWT_SIGNING_KEY: local-dev-jwt-signing-key-change-me-32chars
      LOG_LEVEL: info
      LOG_FORMAT: json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  strait:
    container_name: strait
    build:
      context: .
    restart: unless-stopped
    command: ["serve", "--mode", "all"]
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      DATABASE_URL: postgres://strait:strait@postgres:5432/strait?sslmode=disable
      REDIS_URL: redis://redis:6379
      SEQUIN_BASE_URL: http://sequin:7376
      SEQUIN_CONSUMER_NAME: strait-cdc
      INTERNAL_SECRET: local-dev-internal-secret-change-me
      JWT_SIGNING_KEY: local-dev-jwt-signing-key-change-me-32chars
      MODE: all
      PORT: "8080"
      LOG_LEVEL: info
      LOG_FORMAT: json
      MIGRATION_MODE: validate
      GRPC_BIND_ADDR: 0.0.0.0
      ALLOW_PRIVATE_ENDPOINTS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      sequin:
        condition: service_healthy
      strait-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "strait", "health", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

volumes:
  pgdata:
