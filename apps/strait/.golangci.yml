version: "2"

run:
  timeout: 10m
  modules-download-mode: readonly
  allow-serial-runners: true
  concurrency: 2

issues:
  max-same-issues: 50

formatters:
  enable:
    - goimports

  settings:
    goimports:
      local-prefixes:
        - strait

linters:
  enable:
    - asasalint        # checks for pass []any as any in variadic func(...any)
    - asciicheck       # checks that your code does not contain non-ASCII identifiers
    - bidichk          # checks for dangerous unicode character sequences
    - copyloopvar      # detects places where loop variables are copied (Go 1.22+)
    - durationcheck    # checks for two durations multiplied together
    - dupword          # catches duplicated words in comments and raw strings
    - errcheck         # checks that returned errors are handled
    - errname          # checks that sentinel errors are prefixed with Err
    - errorlint        # finds code that will cause problems with error wrapping
    - exhaustive       # checks exhaustiveness of enum switch statements
    - fatcontext       # detects nested contexts in loops
    - gocheckcompilerdirectives # validates go compiler directive comments
    - goprintffuncname # checks that printf-like functions are named with f
    - govet            # reports suspicious constructs
    - ineffassign      # detects when assignments to existing variables are not used
    - makezero         # rejects confusing make([]T, n) followed by append
    - mirror           # catches wrong strings/bytes helper pairings
    - nilerr           # finds code that returns nil even if error is not nil
    - nakedret         # keeps returned values explicit outside tiny helpers
    - nolintlint       # reports ill-formed or insufficient nolint directives
    - nosprintfhostport # checks for misuse of Sprintf to construct host:port
    - predeclared      # finds code that shadows Go's predeclared identifiers
    - prealloc         # suggests obvious slice capacity preallocation
    - promlinter       # checks Prometheus metrics naming
    - reassign         # checks that package variables are not reassigned
    - recvcheck        # checks for receiver type consistency
    - rowserrcheck     # checks whether Err of rows is checked
    - sloglint         # ensures consistent code style when using log/slog
    - spancheck        # checks for mistakes with OpenTelemetry spans
    - sqlclosecheck    # checks that sql.Rows and sql.Stmt are closed
    - staticcheck      # go vet on steroids
    - testifylint      # checks testify assertions and helpers
    - thelper          # checks that test helpers call t.Helper
    - unconvert        # removes unnecessary conversions that hide real type intent
    - unused           # checks for unused constants, variables, functions and types
    - whitespace       # detects leading and trailing whitespace
  disable:
    - bodyclose        # noisy with failsafe generic http.Response policy builders; enable after wrapping those calls
    - gosec            # covered by the dedicated Security workflow; too expensive for regular lint
    - unparam          # slow whole-program analyzer with low signal for evolving internal APIs
    - wastedassign     # mostly overlaps with ineffassign/staticcheck, but is slower
    - cyclop           # complexity budgets are review concerns, not fast-path lint
    - funlen           # function length is noisy in handlers and generated registration code
    - gocognit         # cognitive complexity is too slow/noisy for regular lint
    - gocritic         # broad style/perf analyzer; staticcheck covers the higher-signal bugs
    - gocyclo          # duplicate complexity budget with cyclop
    - godot            # comment punctuation is low-signal for regular lint
    - intrange         # modernization preference, not correctness
    - modernize        # modernization preference, not correctness
    - nestif           # complexity budget is a review concern
    - revive           # broad style analyzer; too noisy for regular lint

  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow  # too noisy with err shadowing in nested scopes

    nolintlint:
      allow-no-explanation: [funlen, gocognit, golines, nilnil]
      require-explanation: false
      require-specific: true

    reassign:
      patterns:
        - ".*"

    sloglint:
      no-global: ""
      context: ""

    staticcheck:
      checks:
        - all
        - -ST1000  # package comment
        - -ST1016  # receiver names
        - -QF1008  # omit embedded fields

    exhaustive:
      default-signifies-exhaustive: true

  exclusions:
    warn-unused: false
    presets:
      - std-error-handling
      - common-false-positives
      - comments
    rules:
      - text: 'comment on exported \S+ \S+ should be of the form'
        source: '// ?(nolint|TODO)'
        linters: [staticcheck]
      - path: _test\.go
        linters:
          - predeclared
          - reassign
          - errname
          - govet
      - path: _test\.go
        text: "SA5011"
        linters: [staticcheck]
      - path: cmd/strait/
        linters: [nolintlint, reassign]
      # Generated protobuf files use naming conventions (e.g. WorkerId, RunId)
      # that differ from Go idioms (WorkerID, RunID). Staticcheck ST1003 is
      # excluded here. The "// Code generated" marker in these files
      # suppresses most linters, but the path exclusion provides an extra safety net.
      # Source: proto/worker/v1/worker.proto; regenerate with: make proto
      - path: internal/api/grpc/proto/
        linters: [staticcheck, goimports]
      # moq-generated mocks for store/api interfaces; the file header comment
      # and import grouping are emitted verbatim by github.com/matryer/moq.
      - path: internal/api/mock_.*_test\.go
        linters: [goimports]
