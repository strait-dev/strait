version: "2"

run:
  allow-parallel-runners: true

issues:
  max-same-issues: 50

formatters:
  enable:
    - goimports

  settings:
    goimports:
      local-prefixes:
        - strait

linters:
  enable:
    - asasalint        # checks for pass []any as any in variadic func(...any)
    - asciicheck       # checks that your code does not contain non-ASCII identifiers
    - bidichk          # checks for dangerous unicode character sequences
    - copyloopvar      # detects places where loop variables are copied (Go 1.22+)
    - cyclop           # checks function and package cyclomatic complexity
    - durationcheck    # checks for two durations multiplied together
    - errname          # checks that sentinel errors are prefixed with Err
    - errorlint        # finds code that will cause problems with error wrapping
    - exhaustive       # checks exhaustiveness of enum switch statements
    - fatcontext       # detects nested contexts in loops
    - funlen           # detection of long functions
    - gocheckcompilerdirectives # validates go compiler directive comments
    - gocognit         # computes and checks cognitive complexity
    - gocritic         # provides diagnostics for bugs, performance and style issues
    - gocyclo          # computes and checks cyclomatic complexity
    - godot            # checks if comments end in a period
    - goprintffuncname # checks that printf-like functions are named with f
    - gosec            # inspects source code for security problems
    - govet            # reports suspicious constructs
    - ineffassign      # detects when assignments to existing variables are not used
    - intrange         # finds places where for loops could use integer range
    - makezero         # finds slice declarations with non-zero initial length
    - mirror           # reports wrong mirror patterns of bytes/strings usage
    - modernize        # detects code that can be modernized
    - nakedret         # finds naked returns in functions
    - nestif           # reports deeply nested if statements
    - nilerr           # finds code that returns nil even if error is not nil
    - nolintlint       # reports ill-formed or insufficient nolint directives
    - nosprintfhostport # checks for misuse of Sprintf to construct host:port
    - predeclared      # finds code that shadows Go's predeclared identifiers
    - promlinter       # checks Prometheus metrics naming
    - reassign         # checks that package variables are not reassigned
    - recvcheck        # checks for receiver type consistency
    - revive           # fast, configurable linter, drop-in replacement of golint
    - rowserrcheck     # checks whether Err of rows is checked
    - sloglint         # ensures consistent code style when using log/slog
    - spancheck        # checks for mistakes with OpenTelemetry spans
    - sqlclosecheck    # checks that sql.Rows and sql.Stmt are closed
    - staticcheck      # go vet on steroids
    - unconvert        # removes unnecessary type conversions
    - unparam          # reports unused function parameters
    - unused           # checks for unused constants, variables, functions and types
    - wastedassign     # finds wasted assignment statements
    - whitespace       # detects leading and trailing whitespace

    ## disabled for project-specific reasons
    #- bodyclose        # too many false positives with failsafe-go Policy[*http.Response]
    #- canonicalheader  # we use industry-standard non-canonical headers (X-API-Version, X-RateLimit-*)
    #- contextcheck     # too many false positives with chi middleware chain
    #- depguard         # dependency set is well-established
    #- dupword          # too noisy in comments
    #- errcheck         # covered by gosec and errorlint for critical cases
    #- exhaustruct      # too strict for domain types with many optional fields
    #- gochecknoglobals # we use package-level vars for Lua scripts and configs
    #- goconst          # too noisy with repeated status strings and config values
    #- golines          # too aggressive line-length reformatting for chain calls
    #- mnd              # too many false positives with config constants and billing
    #- nilnil           # we use nil,nil in Huma doc-only stubs
    #- noctx            # many internal HTTP calls intentionally omit context
    #- nonamedreturns   # named returns used in some store methods for clarity
    #- perfsprint       # marginal perf gain, high noise
    #- usestdlibvars    # too noisy with numeric status codes

  settings:
    cyclop:
      max-complexity: 32
      package-average: 14.0

    funlen:
      lines: 250
      statements: 85

    gocognit:
      min-complexity: 55

    gocyclo:
      min-complexity: 32

    gocritic:
      disabled-checks:
        - ifElseChain
      settings:
        captLocal:
          paramsOnly: false
        underef:
          skipRecvDeref: false

    godot:
      scope: toplevel

    gosec:
      excludes:
        - G117 # config struct serialization is intentional
        - G703 # paths from CLI flags and literals
        - G704 # URLs from validated job config
        - G706 # structured logging is safe

    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow  # too noisy with err shadowing in nested scopes

    nakedret:
      max-func-lines: 0

    nestif:
      min-complexity: 10

    nolintlint:
      allow-no-explanation: [funlen, gocognit, golines, nilnil, gosec]
      require-explanation: false
      require-specific: true

    reassign:
      patterns:
        - ".*"

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
          arguments:
            - disableStutteringCheck
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id

    sloglint:
      no-global: ""
      context: ""

    staticcheck:
      checks:
        - all
        - -ST1000  # package comment
        - -ST1016  # receiver names
        - -QF1008  # omit embedded fields

    exhaustive:
      default-signifies-exhaustive: true

  exclusions:
    warn-unused: true
    presets:
      - std-error-handling
      - common-false-positives
      - comments
    rules:
      - source: 'TODO'
        linters: [godot]
      - text: 'should have a package comment'
        linters: [revive]
      - text: 'exported \S+ \S+ should have comment'
        linters: [revive]
      - text: 'comment on exported \S+ \S+ should be of the form'
        source: '// ?(nolint|TODO)'
        linters: [revive, staticcheck]
      - text: 'avoid meaningless'
        path: internal/api/
        linters: [revive]
      - text: 'avoid package names that conflict with Go standard library'
        linters: [revive]
      - text: "taint analysis|G117"
        linters: [gosec]
      - text: "Non-inherited new context"
        linters: [contextcheck]
      - text: "should pass the context parameter"
        linters: [contextcheck]
      - path: _test\.go
        linters:
          - bodyclose
          - cyclop
          - dupl
          - errcheck
          - funlen
          - gocognit
          - goconst
          - gocyclo
          - gosec
          - nestif
          - noctx
          - predeclared
          - reassign
          - unparam
          - revive
          - nilnil
          - errname
          - govet
      - path: internal/store/
        linters: [nilnil]
      - path: internal/api/huma_operations.go
        linters: [funlen, gocognit, gocyclo]
      - path: internal/api/routes.go
        linters: [funlen, gocognit, gocyclo]
      - path: cmd/strait/
        linters: [funlen, gocognit, gocyclo, cyclop, nestif, nolintlint, reassign]
      - path: test/
        linters: [cyclop, funlen, gocognit, nestif]
