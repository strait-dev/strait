[extend]
useDefault = true

[allowlist]
description = "Allowlist for test fixtures, docs examples, and dev-only config"

paths = [
    '''_test\.go$''',
    '''test/''',
    '''testdata/''',
    '''loadtest/''',
    '''scripts/''',
    '''docs/''',
    '''\.env\.example$''',
    '''docker-compose.*\.yml$''',
    '''Makefile$''',
]

regexTarget = "match"
regexes = [
    '''test-secret-value''',
    '''test-encryption-key''',
    '''aaaa-test-''',
    '''strait_[a-f0-9]{10,}''',
    '''owasp-test-''',
    '''loadtest-secret''',
    '''dump-openapi''',
]
