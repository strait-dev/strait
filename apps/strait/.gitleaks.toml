[extend]
useDefault = true

[allowlist]
description = "Allowlist for test fixtures, docs examples, build artifacts, and dev-only config"

paths = [
    '''_test\.go$''',
    '''_test\.ts$''',
    '''__tests__/''',
    '''test/''',
    '''testdata/''',
    '''loadtest/''',
    '''scripts/''',
    '''docs/''',
    '''\.env\.example$''',
    '''docker-compose.*\.yml$''',
    '''Makefile$''',
    '''\.next/''',
    '''\.github/workflows/''',
    '''apps/website/''',
    '''apps/app/src/hooks/api/''',
    # Generated JS runtime bundles — Effect.ts library symbol keys such as
    # "effect/ScheduleInterval" are falsely detected as generic API keys due
    # to their entropy profile and "/" path separator.
    '''internal/agents/.*\.js$''',
]

regexTarget = "match"
regexes = [
    '''test-secret''',
    '''test-encryption-key''',
    '''aaaa-test-''',
    '''e2e-internal-secret''',
    '''e2e-jwt-signing-key''',
    '''ci-jwt-key''',
    '''strait_[a-f0-9]{6,}''',
    '''whsec_[a-z0-9]+''',
    '''owasp-test-''',
    '''loadtest-secret''',
    '''dump-openapi''',
    '''mwesulbn1k\.ufs\.sh''',
    # Effect.ts library symbol keys embedded in compiled agent worker bundles
    '''effect/Schedule''',
]
