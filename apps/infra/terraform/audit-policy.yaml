# K8s API audit policy — controls what API operations are logged.
# Replaces the default "log everything" behavior with targeted rules.
# Reduces noise while capturing security-relevant events.
#
# Referenced by k3s: --kube-apiserver-arg=audit-policy-file=/etc/rancher/k3s/audit-policy.yaml
apiVersion: audit.k8s.io/v1
kind: Policy
rules:
  # Skip logging health checks and readiness probes.
  - level: None
    nonResourceURLs:
      - "/healthz*"
      - "/livez*"
      - "/readyz*"
      - "/metrics"

  # Skip logging kube-system service account token requests (very noisy).
  - level: None
    users: ["system:serviceaccount:kube-system:*"]
    verbs: ["get", "list", "watch"]

  # Log full request+response for sensitive operations.
  - level: RequestResponse
    resources:
      - group: ""
        resources: ["secrets", "configmaps"]
    verbs: ["create", "update", "patch", "delete"]

  # Log full request+response for RBAC changes.
  - level: RequestResponse
    resources:
      - group: "rbac.authorization.k8s.io"
        resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]

  # Log full request+response for pod/job creation and deletion.
  - level: RequestResponse
    resources:
      - group: ""
        resources: ["pods"]
      - group: "batch"
        resources: ["jobs"]
    verbs: ["create", "delete"]

  # Log metadata for all other write operations.
  - level: Metadata
    verbs: ["create", "update", "patch", "delete", "deletecollection"]

  # Log metadata for authentication failures.
  - level: Metadata
    resources:
      - group: "authentication.k8s.io"

  # Skip logging read-only operations on non-sensitive resources.
  - level: None
    verbs: ["get", "list", "watch"]
