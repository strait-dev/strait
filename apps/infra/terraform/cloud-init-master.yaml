#cloud-config

# ──────────────────────────────────────────────
# Security Hardening
# ──────────────────────────────────────────────

ssh_pwauth: false

package_update: true
packages:
  - curl
  - fail2ban
  - unattended-upgrades
  - awscli

write_files:
  # SSH hardening.
  - path: /etc/ssh/sshd_config.d/99-strait-hardening.conf
    content: |
      PasswordAuthentication no
      PermitRootLogin prohibit-password
      MaxAuthTries 3
      X11Forwarding no
      AllowTcpForwarding no
      ClientAliveInterval 300
      ClientAliveCountMax 2

  # Automatic security updates.
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

  # Log rotation for k3s audit logs (prevents unbounded disk growth).
  - path: /etc/logrotate.d/k3s-audit
    content: |
      /var/log/k3s-audit.log {
        daily
        rotate 14
        compress
        delaycompress
        missingok
        notifempty
        copytruncate
      }

  # Etcd snapshot backup to S3 (runs every 6 hours via systemd timer).
  - path: /usr/local/bin/etcd-backup.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail
      SNAPSHOT_DIR="/var/lib/rancher/k3s/server/db/snapshots"
      if [ -z "$${BACKUP_S3_BUCKET:-}" ] || [ -z "$${BACKUP_S3_ENDPOINT:-}" ]; then
        echo "Backup S3 not configured, skipping"
        exit 0
      fi
      export AWS_ACCESS_KEY_ID="$${BACKUP_S3_ACCESS_KEY}"
      export AWS_SECRET_ACCESS_KEY="$${BACKUP_S3_SECRET_KEY}"
      aws s3 sync "$SNAPSHOT_DIR" "s3://$${BACKUP_S3_BUCKET}/etcd-snapshots/" \
        --endpoint-url "$${BACKUP_S3_ENDPOINT}" \
        --delete \
        --quiet
      echo "$$(date): Backup synced to s3://$${BACKUP_S3_BUCKET}/etcd-snapshots/"

  - path: /etc/systemd/system/etcd-backup.service
    content: |
      [Unit]
      Description=Sync etcd snapshots to S3
      After=k3s.service
      [Service]
      Type=oneshot
      EnvironmentFile=-/etc/default/etcd-backup
      ExecStart=/usr/local/bin/etcd-backup.sh

  - path: /etc/systemd/system/etcd-backup.timer
    content: |
      [Unit]
      Description=Etcd backup timer (every 6 hours)
      [Timer]
      OnCalendar=*-*-* 00/6:00:00
      Persistent=true
      [Install]
      WantedBy=timers.target

runcmd:
  # Apply SSH hardening.
  - systemctl restart sshd

  # Start fail2ban.
  - systemctl enable fail2ban
  - systemctl start fail2ban

  # ──────────────────────────────────────────────
  # Install k3s Server
  # ──────────────────────────────────────────────
  # Install k3s with Calico CNI (Flannel does NOT enforce NetworkPolicy).
  # --flannel-backend=none: disable built-in Flannel so Calico handles networking.
  # --disable-network-policy: disable k3s built-in network policy controller (Calico replaces it).
  - curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="server --disable traefik --disable servicelb --flannel-backend=none --disable-network-policy --node-label strait.dev/pool=general --secrets-encryption --protect-kernel-defaults --tls-san ${master_public_ip} --kube-apiserver-arg=audit-log-path=/var/log/k3s-audit.log --kube-apiserver-arg=audit-log-maxage=30 --etcd-snapshot-schedule-cron=0\ */6\ *\ *\ * --etcd-snapshot-retention=10" sh -

  # Wait for k3s API to be ready (nodes will be NotReady until Calico is deployed).
  - while ! /usr/local/bin/kubectl get nodes 2>/dev/null; do sleep 2; done

  # Deploy Calico CNI for networking + NetworkPolicy enforcement.
  # Uses VXLAN backend (same as Flannel was using) over the private network interface (eth1).
  - /usr/local/bin/kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.27.0/manifests/calico-vxlan.yaml
  # Configure Calico to use the private network interface for VXLAN.
  - /usr/local/bin/kubectl -n kube-system set env daemonset/calico-node IP_AUTODETECTION_METHOD=interface=eth1
  # Wait for Calico to be ready.
  - while ! /usr/local/bin/kubectl -n kube-system rollout status daemonset/calico-node --timeout=120s 2>/dev/null; do sleep 5; done

  # Enable etcd backup timer (runs even if S3 not configured — script exits cleanly).
  - systemctl daemon-reload
  - systemctl enable etcd-backup.timer
  - systemctl start etcd-backup.timer

  - echo "k3s master ready with Calico CNI"
