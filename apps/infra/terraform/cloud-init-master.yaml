#cloud-config

# ──────────────────────────────────────────────
# Security Hardening
# ──────────────────────────────────────────────

ssh_pwauth: false

package_update: true
packages:
  - curl
  - fail2ban
  - unattended-upgrades

write_files:
  # SSH hardening.
  - path: /etc/ssh/sshd_config.d/99-strait-hardening.conf
    content: |
      PasswordAuthentication no
      PermitRootLogin prohibit-password
      MaxAuthTries 3
      X11Forwarding no
      AllowTcpForwarding no
      ClientAliveInterval 300
      ClientAliveCountMax 2

  # Automatic security updates.
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

runcmd:
  # Apply SSH hardening.
  - systemctl restart sshd

  # Start fail2ban.
  - systemctl enable fail2ban
  - systemctl start fail2ban

  # ──────────────────────────────────────────────
  # Install k3s Server
  # ──────────────────────────────────────────────
  # --disable traefik: no ingress controller needed for job pods.
  # --disable servicelb: no load balancer needed.
  # --flannel-iface eth1: use private network for pod networking.
  # --node-label: mark master as general pool (can also run micro/small jobs).
  # --secrets-encryption: encrypt K8s secrets at rest in etcd.
  # --protect-kernel-defaults: enforce sysctl security defaults.
  - curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="server --disable traefik --disable servicelb --flannel-iface eth1 --node-label strait.dev/pool=general --secrets-encryption --protect-kernel-defaults --tls-san ${master_public_ip} --kube-apiserver-arg=audit-log-path=/var/log/k3s-audit.log --kube-apiserver-arg=audit-log-maxage=30" sh -

  # Wait for k3s to be ready.
  - while ! /usr/local/bin/kubectl get nodes 2>/dev/null; do sleep 2; done
  - echo "k3s master ready"
