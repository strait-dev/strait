# PodDisruptionBudget for the Strait API server.
# Ensures at least 1 replica stays available during voluntary disruptions
# (node drain, cluster upgrades, autoscaler scale-down).
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: strait
  namespace: strait
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: strait
