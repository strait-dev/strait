# OpenTelemetry Collector — receives traces/metrics/logs from Strait,
# exports to ClickHouse (traces) and Grafana Cloud (metrics + logs).
#
# Secrets loaded from K8s Secret "otel-env" (provision from Doppler).
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: strait
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

      # Scrape Strait's /metrics endpoint (K8s internal DNS).
      prometheus:
        config:
          scrape_configs:
            - job_name: strait
              scrape_interval: 15s
              static_configs:
                - targets: ['strait.strait.svc:8080']

    processors:
      batch:
        timeout: 5s
        send_batch_size: 1000

    exporters:
      # ClickHouse Cloud for trace storage.
      clickhouse:
        endpoint: ${env:CLICKHOUSE_ENDPOINT}
        username: ${env:CLICKHOUSE_USER}
        password: ${env:CLICKHOUSE_PASSWORD}
        database: default
        ttl: 2160h
        traces_table_name: otel_traces
        timeout: 10s
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s

      # Grafana Cloud for metrics dashboards.
      prometheusremotewrite:
        endpoint: ${env:GRAFANA_REMOTE_WRITE_URL}
        auth:
          authenticator: basicauth/grafana

      # Grafana Cloud Loki for log aggregation.
      otlphttp/loki:
        endpoint: ${env:GRAFANA_LOKI_URL}
        auth:
          authenticator: basicauth/loki

    extensions:
      basicauth/grafana:
        client_auth:
          username: ${env:GRAFANA_REMOTE_WRITE_USERNAME}
          password: ${env:GRAFANA_CLOUD_TOKEN}
      basicauth/loki:
        client_auth:
          username: ${env:GRAFANA_LOKI_USERNAME}
          password: ${env:GRAFANA_CLOUD_TOKEN}

    service:
      extensions: [basicauth/grafana, basicauth/loki]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [clickhouse]
        metrics:
          receivers: [otlp, prometheus]
          processors: [batch]
          exporters: [prometheusremotewrite]
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlphttp/loki]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: strait
  labels:
    app: otel-collector
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/component: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
        app.kubernetes.io/name: otel-collector
        app.kubernetes.io/component: observability
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.115.0
          args: ["--config=/etc/otelcol/config.yaml"]
          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
          envFrom:
            - secretRef:
                name: otel-env
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 10
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
# Internal service — Strait sends telemetry here via OTLP.
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: strait
  labels:
    app: otel-collector
spec:
  type: ClusterIP
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
      protocol: TCP
