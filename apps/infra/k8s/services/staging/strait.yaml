# Staging Strait API — single replica, debug logging, stg Doppler config.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: strait
  namespace: strait-staging
  labels:
    app: strait
    environment: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: strait
  template:
    metadata:
      labels:
        app: strait
        environment: staging
    spec:
      serviceAccountName: strait-server
      imagePullSecrets:
        - name: ghcr-pull-secret
      terminationGracePeriodSeconds: 15
      containers:
        - name: strait
          image: ghcr.io/strait-dev/strait:latest
          args: ["serve", "--mode", "all"]
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - secretRef:
                name: strait-env-stg
          env:
            - name: COMPUTE_RUNTIME
              value: "k8s"
            - name: K8S_NAMESPACE
              value: "default"
            - name: LOG_FORMAT
              value: "text"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: strait
  namespace: strait-staging
spec:
  type: ClusterIP
  selector:
    app: strait
  ports:
    - name: http
      port: 8080
      targetPort: http
