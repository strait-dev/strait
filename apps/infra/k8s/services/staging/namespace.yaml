# Staging namespace — lightweight pre-production environment.
# Same security policies as production (PSS restricted).
# Uses Doppler stg config for different credentials.
apiVersion: v1
kind: Namespace
metadata:
  name: strait-staging
  labels:
    app.kubernetes.io/part-of: strait
    environment: staging
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
