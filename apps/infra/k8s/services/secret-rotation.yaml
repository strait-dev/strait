# Weekly rotation of GHCR image pull secret.
# GitHub PATs expire — this CronJob refreshes the pull secret from
# environment variables provided by the Doppler-synced strait-env secret.
#
# Runs every Monday at 3 AM UTC.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secret-rotator
  namespace: strait
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-rotator
  namespace: strait
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: secret-rotator
  namespace: strait
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: secret-rotator
subjects:
  - kind: ServiceAccount
    name: secret-rotator
    namespace: strait
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: refresh-pull-secret
  namespace: strait
spec:
  schedule: "0 3 * * 1"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: secret-rotator
          restartPolicy: OnFailure
          containers:
            - name: refresh
              image: docker.io/library/alpine:3.21
              command: ["/bin/sh", "-c"]
              args:
                - |
                  apk add --no-cache curl jq
                  if [ -z "$GITHUB_USERNAME" ] || [ -z "$GITHUB_PACKAGES_TOKEN" ]; then
                    echo "GITHUB_USERNAME or GITHUB_PACKAGES_TOKEN not set, skipping"
                    exit 0
                  fi
                  AUTH=$(echo -n "$GITHUB_USERNAME:$GITHUB_PACKAGES_TOKEN" | base64)
                  DOCKERCFG=$(echo -n "{\"auths\":{\"ghcr.io\":{\"auth\":\"$AUTH\"}}}" | base64)
                  cat <<EOSECRET | curl -sf -X PUT \
                    -H "Authorization: Bearer $(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" \
                    -H "Content-Type: application/json" \
                    "https://kubernetes.default.svc/api/v1/namespaces/strait/secrets/ghcr-pull-secret" \
                    -d @-
                  {
                    "apiVersion": "v1",
                    "kind": "Secret",
                    "metadata": { "name": "ghcr-pull-secret", "namespace": "strait" },
                    "type": "kubernetes.io/dockerconfigjson",
                    "data": { ".dockerconfigjson": "$DOCKERCFG" }
                  }
                  EOSECRET
                  echo "Pull secret rotated at $(date)"
              envFrom:
                - secretRef:
                    name: strait-env
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                runAsNonRoot: true
                runAsUser: 65534
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
