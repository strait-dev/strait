# Strait API + Worker server.
# Runs in "all" mode (API + worker in one process).
# Secrets loaded from K8s Secret "strait-env" (provision from Doppler).
#
# External access via NodePort 30080. Put a reverse proxy (Caddy/Cloudflare)
# in front for TLS termination in production.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: strait
  namespace: strait
  labels:
    app: strait
    app.kubernetes.io/name: strait
    app.kubernetes.io/component: server
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: strait
  template:
    metadata:
      labels:
        app: strait
        app.kubernetes.io/name: strait
        app.kubernetes.io/component: server
    spec:
      serviceAccountName: strait-server
      terminationGracePeriodSeconds: 30
      containers:
        - name: strait
          image: ghcr.io/trystrait/strait:latest
          args: ["serve", "--mode", "all"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - secretRef:
                name: strait-env
          env:
            # Override compute runtime to use in-cluster K8s.
            - name: COMPUTE_RUNTIME
              value: "k8s"
            - name: K8S_KUBECONFIG
              value: ""  # Empty = in-cluster auth via service account
            - name: K8S_NAMESPACE
              value: "default"  # Job pods run in default namespace
            # OTel collector is in the same cluster.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.strait.svc:4317"
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
          livenessProbe:
            exec:
              command: ["strait", "health", "--quiet"]
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: strait
                topologyKey: kubernetes.io/hostname
---
# ServiceAccount for the Strait server. Needs RBAC to manage job pods.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: strait-server
  namespace: strait
---
# RBAC: Strait server needs to create/watch/delete Jobs and Pods in the default namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: strait-server
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: strait-server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: strait-server
subjects:
  - kind: ServiceAccount
    name: strait-server
    namespace: strait
---
# Internal service — external traffic goes through Caddy (TLS termination).
apiVersion: v1
kind: Service
metadata:
  name: strait
  namespace: strait
  labels:
    app: strait
spec:
  type: ClusterIP
  selector:
    app: strait
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
