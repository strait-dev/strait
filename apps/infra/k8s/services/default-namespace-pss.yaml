# Pod Security Standards for the default namespace (user job pods).
# Enforces the restricted profile — pods must be non-root, read-only rootfs,
# no privilege escalation, no capabilities, seccomp enabled.
# Any pod that doesn't meet these requirements is rejected at admission.
apiVersion: v1
kind: Namespace
metadata:
  name: default
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
