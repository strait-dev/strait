# Chaos experiment: Drain a worker node.
# Expected: Jobs reschedule to other nodes, no data loss.
apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: strait-node-drain
  namespace: strait
spec:
  appinfo:
    appns: default
    applabel: app=strait-job
    appkind: job
  engineState: active
  chaosServiceAccount: litmus-admin
  experiments:
    - name: node-drain
      spec:
        components:
          env:
            - name: TOTAL_CHAOS_DURATION
              value: "120"
            - name: APP_NODE
              value: ""
