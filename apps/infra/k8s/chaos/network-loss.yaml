# Chaos experiment: 50% packet loss to OTel collector.
# Expected: Strait degrades gracefully (logs warning, no crash).
apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: strait-network-loss
  namespace: strait
spec:
  appinfo:
    appns: strait
    applabel: app=otel-collector
    appkind: deployment
  engineState: active
  chaosServiceAccount: litmus-admin
  experiments:
    - name: pod-network-loss
      spec:
        components:
          env:
            - name: TOTAL_CHAOS_DURATION
              value: "60"
            - name: NETWORK_INTERFACE
              value: "eth0"
            - name: NETWORK_PACKET_LOSS_PERCENTAGE
              value: "50"
