# Chaos experiment: 90% CPU stress on a node.
# Expected: HPA scales up strait replicas, jobs still complete.
apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: strait-cpu-stress
  namespace: strait
spec:
  appinfo:
    appns: strait
    applabel: app=strait
    appkind: deployment
  engineState: active
  chaosServiceAccount: litmus-admin
  experiments:
    - name: node-cpu-hog
      spec:
        components:
          env:
            - name: TOTAL_CHAOS_DURATION
              value: "120"
            - name: NODE_CPU_CORE
              value: "0"
            - name: CPU_LOAD
              value: "90"
