# Weekly CIS benchmark compliance scan using Kubescape.
# Scans the cluster against the NSA/CISA framework and logs results.
# Exits non-zero on CRITICAL findings (triggers PodCrashLoop alert).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: kubescape-scan
  namespace: monitoring
spec:
  schedule: "0 6 * * 0"  # Every Sunday at 6 AM UTC
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: kubescape
          restartPolicy: OnFailure
          containers:
            - name: kubescape
              image: quay.io/kubescape/kubescape:v3.0
              command:
                - kubescape
                - scan
                - framework
                - nsa
                - --format
                - pretty-printer
                - --compliance-threshold
                - "80"
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 65534
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubescape
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubescape
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: ServiceAccount
    name: kubescape
    namespace: monitoring
