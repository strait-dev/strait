# Kyverno Policy Engine — admission controller for K8s security policies.
#
# Install Kyverno CRDs and controller:
#   kubectl apply -f https://github.com/kyverno/kyverno/releases/download/v1.12.0/install.yaml
#
# After installing Kyverno, apply the security policies:
#   kubectl apply -f policies.yaml
#
# Verify policies are active:
#   kubectl get clusterpolicy
#   kubectl get policyreport -A
#
# Test a policy violation (should be rejected):
#   kubectl run test --image=evil.com/malware:latest --dry-run=server
#
# Note: This file documents the installation process. The actual Kyverno
# installation is done via the official manifest URL above (too large to
# vendor in-repo). The policies.yaml file in this directory contains our
# custom security policies.
---
# Kyverno namespace (created by the install manifest).
apiVersion: v1
kind: Namespace
metadata:
  name: kyverno
  labels:
    app.kubernetes.io/part-of: kyverno
    # Kyverno itself needs privileged access to intercept admission requests.
    pod-security.kubernetes.io/enforce: privileged
