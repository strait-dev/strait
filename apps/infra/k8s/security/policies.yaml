# Kyverno ClusterPolicies — enforced on all namespaces.
# These policies reject any pod/deployment that doesn't meet our security standards.
#
# Apply after installing Kyverno:
#   kubectl apply -f policies.yaml
#
# Verify: kubectl get clusterpolicy
# Test:   kubectl run test --image=evil.com/hack:latest --dry-run=server
#         (should be rejected by require-approved-registries)

# 1. Only allow images from approved registries.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-approved-registries
  annotations:
    policies.kyverno.io/title: Require Approved Image Registries
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Only allow container images from trusted registries. Prevents supply chain
      attacks by blocking images from unknown sources.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: validate-image-registry
      match:
        any:
          - resources:
              kinds: ["Pod"]
      validate:
        message: >-
          Image '{{request.object.spec.containers[].image}}' is not from an approved registry.
          Allowed: ghcr.io/strait-dev/, sequin/, otel/, caddy:, registry.k8s.io/, docker.io/library/, distribution/
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                all:
                  - key: "{{element.image}}"
                    operator: AnyNotIn
                    value:
                      - "ghcr.io/strait-dev/*"
                      - "sequin/*"
                      - "otel/*"
                      - "caddy:*"
                      - "registry.k8s.io/*"
                      - "docker.io/library/*"
                      - "distribution/*"
                      - "quay.io/kubescape/*"
                      - "falcosecurity/*"
---
# 2. Require standard labels on all Deployments.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-labels
  annotations:
    policies.kyverno.io/title: Require Standard Labels
    policies.kyverno.io/severity: medium
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: check-labels
      match:
        any:
          - resources:
              kinds: ["Deployment"]
      validate:
        message: "Deployment must have 'app' and 'app.kubernetes.io/name' labels"
        pattern:
          metadata:
            labels:
              app: "?*"
              app.kubernetes.io/name: "?*"
---
# 3. Require resource limits on all containers.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-limits
  annotations:
    policies.kyverno.io/title: Require CPU and Memory Limits
    policies.kyverno.io/severity: high
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-limits
      match:
        any:
          - resources:
              kinds: ["Pod"]
      exclude:
        any:
          - resources:
              namespaces: ["kube-system", "kyverno", "monitoring"]
      validate:
        message: "All containers must have CPU and memory limits set"
        pattern:
          spec:
            containers:
              - resources:
                  limits:
                    memory: "?*"
                    cpu: "?*"
---
# 4. Require non-root execution.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-non-root
  annotations:
    policies.kyverno.io/title: Require Non-Root Containers
    policies.kyverno.io/severity: high
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-non-root
      match:
        any:
          - resources:
              kinds: ["Pod"]
      exclude:
        any:
          - resources:
              namespaces: ["kube-system", "kyverno"]
      validate:
        message: "Pods must set runAsNonRoot: true"
        pattern:
          spec:
            securityContext:
              runAsNonRoot: true
---
# 5. Require read-only root filesystem.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-readonly-rootfs
  annotations:
    policies.kyverno.io/title: Require Read-Only Root Filesystem
    policies.kyverno.io/severity: medium
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: check-readonly-rootfs
      match:
        any:
          - resources:
              kinds: ["Pod"]
      exclude:
        any:
          - resources:
              namespaces: ["kube-system", "kyverno", "monitoring"]
      validate:
        message: "Containers should set readOnlyRootFilesystem: true"
        pattern:
          spec:
            containers:
              - securityContext:
                  readOnlyRootFilesystem: true
---
# 6. Block privileged containers and host access.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: block-privileged
  annotations:
    policies.kyverno.io/title: Block Privileged Containers
    policies.kyverno.io/severity: critical
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: block-privileged-containers
      match:
        any:
          - resources:
              kinds: ["Pod"]
      validate:
        message: "Privileged containers are not allowed"
        pattern:
          spec:
            containers:
              - securityContext:
                  privileged: "!true"
    - name: block-host-namespaces
      match:
        any:
          - resources:
              kinds: ["Pod"]
      validate:
        message: "Host namespaces (hostNetwork, hostPID, hostIPC) are not allowed"
        pattern:
          spec:
            =(hostNetwork): false
            =(hostPID): false
            =(hostIPC): false
---
# 7. Restrict volume types to safe options only.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-volume-types
  annotations:
    policies.kyverno.io/title: Restrict Volume Types
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Block hostPath volumes and other dangerous volume types.
      Only allow configMap, secret, emptyDir, PVC, projected, downwardAPI.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: restrict-volumes
      match:
        any:
          - resources:
              kinds: ["Pod"]
      exclude:
        any:
          - resources:
              namespaces: ["kube-system", "kyverno", "monitoring"]
      validate:
        message: "Only configMap, secret, emptyDir, PVC, projected, and downwardAPI volumes are allowed"
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.volumes[].hostPath || '' }}"
                operator: NotEquals
                value: ""
