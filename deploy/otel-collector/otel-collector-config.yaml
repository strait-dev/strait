receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Scrape Strait's /metrics endpoint directly
  prometheus:
    config:
      scrape_configs:
        - job_name: strait
          scrape_interval: 15s
          static_configs:
            - targets: ['strait.internal:8080']

processors:
  batch:
    timeout: 5s
    send_batch_size: 1000

exporters:
  # ClickHouse Cloud for traces and metrics storage
  clickhouse:
    endpoint: ${env:CLICKHOUSE_ENDPOINT}
    username: ${env:CLICKHOUSE_USER}
    password: ${env:CLICKHOUSE_PASSWORD}
    database: default
    ttl: 2160h
    traces_table_name: otel_traces
    metrics_table_name: otel_metrics
    timeout: 10s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

  # Grafana Cloud for real-time dashboards
  prometheusremotewrite:
    endpoint: ${env:GRAFANA_REMOTE_WRITE_URL}
    auth:
      authenticator: basicauth/grafana

  # Grafana Cloud Loki for log aggregation and search
  otlphttp/loki:
    endpoint: ${env:GRAFANA_LOKI_URL}
    auth:
      authenticator: basicauth/grafana

extensions:
  basicauth/grafana:
    client_auth:
      username: ${env:GRAFANA_REMOTE_WRITE_USERNAME}
      password: ${env:GRAFANA_CLOUD_TOKEN}

service:
  extensions: [basicauth/grafana]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [clickhouse]
    metrics:
      receivers: [otlp, prometheus]
      processors: [batch]
      exporters: [clickhouse, prometheusremotewrite]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/loki]
