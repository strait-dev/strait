app = "strait-otel-collector"
primary_region = "iad"

[build]
  image = "clickhouse/clickstack-otel-collector:latest"

[env]
  # ClickHouse Cloud connection (secrets set via fly secrets)
  # CLICKHOUSE_ENDPOINT = set via `fly secrets set`
  # CLICKHOUSE_USER = set via `fly secrets set`
  # CLICKHOUSE_PASSWORD = set via `fly secrets set`

[http_service]
  internal_port = 4318
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[services]
  [services.concurrency]
    type = "connections"
    hard_limit = 200
    soft_limit = 100

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
