app = "strait-otel-collector"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  # Secrets set via `fly secrets set`:
  # CLICKHOUSE_ENDPOINT, CLICKHOUSE_USER, CLICKHOUSE_PASSWORD
  # GRAFANA_REMOTE_WRITE_URL, GRAFANA_REMOTE_WRITE_USERNAME, GRAFANA_CLOUD_TOKEN

[http_service]
  internal_port = 4318
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
