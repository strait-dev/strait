# Shared Strait runtime definition for local development and self-hosting.
# Override files select build vs published images, host ports, and dashboard services.

name: strait

x-strait-env: &strait-env
  DATABASE_URL: postgres://strait:strait@postgres:5432/strait?sslmode=disable
  REDIS_URL: redis://redis:6379
  SEQUIN_BASE_URL: http://sequin:7376
  SEQUIN_CONSUMER_NAME: strait-cdc
  SEQUIN_API_TOKEN: ${SEQUIN_API_TOKEN:-local-dev-sequin-api-token-change-me}
  INTERNAL_SECRET: ${INTERNAL_SECRET:-local-dev-internal-secret-change-me}
  JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-local-dev-jwt-signing-key-change-me-32chars}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef}
  SECRET_ENCRYPTION_KEY: ${SECRET_ENCRYPTION_KEY:-abcdef0123456789abcdef0123456789}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  LOG_FORMAT: ${LOG_FORMAT:-json}

x-strait-runtime-env: &strait-runtime-env
  <<: *strait-env
  MODE: ${MODE:-all}
  PORT: "8080"
  MIGRATION_MODE: validate
  WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-25}
  DB_MAX_CONNS: ${DB_MAX_CONNS:-50}
  DB_MIN_CONNS: ${DB_MIN_CONNS:-10}
  REDIS_POOL_SIZE: ${REDIS_POOL_SIZE:-30}
  REDIS_MIN_IDLE_CONNS: ${REDIS_MIN_IDLE_CONNS:-5}
  GRPC_BIND_ADDR: ${GRPC_BIND_ADDR:-0.0.0.0}
  GRPC_ALLOW_PLAINTEXT: ${GRPC_ALLOW_PLAINTEXT:-true}
  ALLOW_PRIVATE_ENDPOINTS: ${ALLOW_PRIVATE_ENDPOINTS:-false}

services:
  postgres:
    profiles: ["core"]
    container_name: strait-postgres
    image: postgres:18-alpine
    restart: unless-stopped
    shm_size: 256mb
    environment:
      POSTGRES_USER: strait
      POSTGRES_PASSWORD: strait
      POSTGRES_DB: strait
    volumes:
      - pgdata:/var/lib/postgresql
      - ./packages/configs/postgres-init.sql:/docker-entrypoint-initdb.d/01-sequin.sql:ro
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=10
      - -c
      - max_wal_senders=10
      - -c
      - max_connections=100
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=768MB
      - -c
      - work_mem=8MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - checkpoint_timeout=10min
      - -c
      - idle_in_transaction_session_timeout=30s
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strait -d strait"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    deploy:
      resources:
        reservations:
          memory: 512M
        limits:
          memory: 1024M
          cpus: "2.0"

  redis:
    profiles: ["core"]
    container_name: strait-redis
    image: redis:8-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory-policy
      - noeviction
      - --save
      - "60"
      - "1000"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    deploy:
      resources:
        reservations:
          memory: 128M
        limits:
          memory: 512M
          cpus: "1.0"

  strait-migrate:
    profiles: ["core"]
    container_name: strait-migrate
    image: ${STRAIT_IMAGE:-ghcr.io/strait-dev/strait:0.1.6}
    restart: "no"
    command: ["migrate", "up"]
    environment:
      <<: *strait-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres-cdc-init:
    profiles: ["core"]
    container_name: strait-postgres-cdc-init
    image: postgres:18-alpine
    restart: "no"
    command:
      - sh
      - -c
      - psql "$$DATABASE_URL" -v ON_ERROR_STOP=1 -f /config/postgres-init.sql
    environment:
      DATABASE_URL: postgres://strait:strait@postgres:5432/strait?sslmode=disable
    volumes:
      - ./packages/configs/postgres-init.sql:/config/postgres-init.sql:ro
    depends_on:
      postgres:
        condition: service_healthy
      strait-migrate:
        condition: service_completed_successfully

  sequin:
    profiles: ["core"]
    container_name: strait-sequin
    image: sequin/sequin:v0.14.6
    restart: unless-stopped
    environment:
      PG_HOSTNAME: postgres
      PG_PORT: "5432"
      PG_USERNAME: strait
      PG_PASSWORD: strait
      PG_DATABASE: strait
      REDIS_URL: redis://redis:6379
      SEQUIN_API_TOKEN: ${SEQUIN_API_TOKEN:-local-dev-sequin-api-token-change-me}
      SECRET_KEY_BASE: ${SEQUIN_SECRET_KEY_BASE:-tONJRnB3NMPNPSbvLsKzE/r6lklVO+04MfFNWPBzBtBt2G5H0rrn8bwdHcRXiSQ3}
      VAULT_KEY: ${SEQUIN_VAULT_KEY:-Gw1VfMPCshBaUeXrOvIPFTVtW/d5xlv93F7BPfVo7Ys=}
      CONFIG_FILE_PATH: /etc/sequin/config.yml
    volumes:
      - ./packages/configs/sequin.yml:/etc/sequin/config.yml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres-cdc-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7376/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        reservations:
          memory: 256M
        limits:
          memory: 768M
          cpus: "1.0"

  strait:
    profiles: ["core"]
    container_name: strait
    image: ${STRAIT_IMAGE:-ghcr.io/strait-dev/strait:0.1.6}
    restart: unless-stopped
    command: ["serve", "--mode", "${MODE:-all}"]
    environment:
      <<: *strait-runtime-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      sequin:
        condition: service_healthy
      strait-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "strait", "health", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    deploy:
      resources:
        reservations:
          memory: 256M
        limits:
          memory: 768M
          cpus: "1.0"

  prometheus:
    profiles: ["observability"]
    container_name: strait-prometheus
    image: prom/prometheus:v3.5.0
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        printf '%s' "$${INTERNAL_SECRET}" > /tmp/strait_internal_secret
        exec /bin/prometheus \
          --config.file=/etc/prometheus/prometheus.yml \
          --storage.tsdb.path=/prometheus \
          --web.console.libraries=/usr/share/prometheus/console_libraries \
          --web.console.templates=/usr/share/prometheus/consoles
    environment:
      INTERNAL_SECRET: ${INTERNAL_SECRET:-local-dev-internal-secret-change-me}
    ports:
      - "9090:9090"
    volumes:
      - ./packages/configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    depends_on:
      strait:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  prometheusdata:
