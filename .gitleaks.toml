[extend]
useDefault = true

[allowlist]
description = "Allowlist for test fixtures, docs examples, build artifacts, and dev-only config"

paths = [
    '''^\.agents/''',
    '''^apps/docs/.*\.mdx$''',
    '''^apps/website/\.next/''',
    '''^docs/.*\.mdx$''',
    '''_test\.go$''',
    '''_test\.ts$''',
    '''__tests__/''',
    '''test/''',
    '''testdata/''',
    '''loadtest/''',
    '''scripts/''',
    '''\.env\.example$''',
    '''docker-compose.*\.yml$''',
    '''Makefile$''',
    '''\.github/workflows/''',
    '''apps/app/src/hooks/api/''',
    # Generated JS bundles embedded in the Go binary. These files are produced by
    # the build pipeline and contain third-party library Symbol keys (e.g.
    # "effect/ScheduleInterval") that gitleaks misidentifies as API keys due to
    # the slash-separated format matching its generic-api-key heuristic.
    '''internal/agents/.*_bundle\.js$''',
]

regexTarget = "match"
regexes = [
    '''test-secret''',
    '''test-encryption-key''',
    '''aaaa-test-''',
    '''e2e-internal-secret''',
    '''e2e-jwt-signing-key''',
    '''ci-jwt-key''',
    '''strait_[a-f0-9]{6,}''',
    '''whsec_[a-z0-9]+''',
    '''owasp-test-''',
    '''loadtest-secret''',
    '''dump-openapi''',
    '''mwesulbn1k\.ufs\.sh''',
    '''Authorization:\s*Bearer\s+(\$[A-Z0-9_]+|YOUR_[A-Z0-9_]+|<[^>]+>|strait_\.\.\.|strait_sk_\.\.\.|eyJ\.\.\.)''',
]
