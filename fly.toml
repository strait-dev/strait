app = "orchestrator"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  MODE = "all"
  PORT = "8080"
  LOG_LEVEL = "info"
  WORKER_CONCURRENCY = "10"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "10s"
  interval = "15s"
  method = "GET"
  path = "/health/ready"
  timeout = "5s"
