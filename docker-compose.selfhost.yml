# Strait Self-Hosted Deployment
#
# Quick start:
#   1. make selfhost
#      (or run ./packages/scripts/selfhost-init.sh and docker compose manually)
#   3. open http://localhost:3000   (Dashboard)
#
# Services: Postgres, Redis, Sequin (CDC), Strait API, Dashboard.
# See SELFHOST.md for full documentation.

# Load secrets from .env.selfhost for variable substitution (${VAR} syntax).
# Services also load it via env_file for runtime env vars.

services:
  postgres:
    container_name: strait-postgres
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: strait
      POSTGRES_PASSWORD: strait
      POSTGRES_DB: strait
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./packages/configs/postgres-init.sql:/docker-entrypoint-initdb.d/01-sequin.sql:ro
    command: >
      postgres
      -c wal_level=logical
      -c max_replication_slots=10
      -c max_wal_senders=10
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strait -d strait"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    container_name: strait-redis
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Strait API starts first to run migrations and create tables.
  strait:
    container_name: strait-api
    image: ${STRAIT_IMAGE:-ghcr.io/strait-dev/strait:latest}
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env.selfhost
    environment:
      STRAIT_EDITION: community
      DATABASE_URL: postgres://strait:strait@postgres:5432/strait?sslmode=disable
      REDIS_URL: redis://redis:6379
      MODE: all
      PORT: "8080"
      LOG_LEVEL: info
      LOG_FORMAT: json
      MIGRATION_MODE: auto
      ALLOW_PRIVATE_ENDPOINTS: "true"
      WORKER_CONCURRENCY: "25"
      SEQUIN_BASE_URL: http://sequin:7376
      SEQUIN_CONSUMER_NAME: strait-cdc
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Sequin starts after Strait so tables and replication slot exist.
  sequin:
    container_name: strait-sequin
    image: sequin/sequin@sha256:336759c1c632ebdc87939bcea70b26b46df6593e666088e1bf29058209437d3e
    restart: unless-stopped
    ports:
      - "7376:7376"
    env_file:
      - .env.selfhost
    environment:
      PG_HOSTNAME: postgres
      PG_PORT: "5432"
      PG_USERNAME: strait
      PG_PASSWORD: strait
      PG_DATABASE: strait
      REDIS_URL: redis://redis:6379
      SECRET_KEY_BASE: ${SEQUIN_SECRET_KEY_BASE}
      VAULT_KEY: ${SEQUIN_VAULT_KEY}
      CONFIG_FILE_PATH: /etc/sequin/config.yml
    volumes:
      - ./packages/configs/sequin.yml:/etc/sequin/config.yml:ro
    depends_on:
      strait:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7376/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # One-shot init container that runs Better Auth migrations against the
  # shared Postgres before strait-app starts. Uses the Bun builder image
  # with the repo mounted because the published strait-app runtime image
  # is intentionally minimal (node:22-alpine + compiled bundle + static
  # assets, no source or package manager). Self-host users already have
  # the repo cloned per SELFHOST.md, so mounting the source tree costs
  # nothing extra. The install is fast on re-runs because bun caches
  # node_modules on the host volume.
  strait-app-migrate:
    container_name: strait-app-migrate
    image: oven/bun:1.3.11-alpine
    restart: "no"
    working_dir: /repo/apps/app
    command:
      - sh
      - -c
      - "bun install --frozen-lockfile && bun run db:migrate:bun"
    volumes:
      - ./:/repo
    env_file:
      - .env.selfhost
    environment:
      AUTH_DATABASE_URL: postgres://strait:strait@postgres:5432/strait?sslmode=disable
      BETTER_AUTH_URL: http://localhost:3000
      RESEND_API_KEY: "re_selfhost_placeholder"
    depends_on:
      postgres:
        condition: service_healthy

  strait-app:
    container_name: strait-app
    image: ${STRAIT_APP_IMAGE:-ghcr.io/strait-dev/strait-app:latest}
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.selfhost
    environment:
      STRAIT_API_URL: http://strait:8080
      AUTH_DATABASE_URL: postgres://strait:strait@postgres:5432/strait?sslmode=disable
      BETTER_AUTH_URL: http://localhost:3000
      RESEND_API_KEY: "re_selfhost_placeholder"
      PORT: "3000"
    depends_on:
      strait:
        condition: service_healthy
      postgres:
        condition: service_healthy
      strait-app-migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
