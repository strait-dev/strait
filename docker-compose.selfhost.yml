# Self-host overrides for the shared Strait runtime.
#
# Start the full self-host stack:
#   docker compose --env-file .env.selfhost -f docker-compose.base.yml -f docker-compose.selfhost.yml --profile core --profile dashboard up -d

services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  sequin:
    ports:
      - "7376:7376"
    environment:
      SEQUIN_API_TOKEN: ${SEQUIN_API_TOKEN:?run ./packages/scripts/selfhost-init.sh}
      SECRET_KEY_BASE: ${SEQUIN_SECRET_KEY_BASE:?run ./packages/scripts/selfhost-init.sh}
      VAULT_KEY: ${SEQUIN_VAULT_KEY:?run ./packages/scripts/selfhost-init.sh}

  strait-migrate:
    image: ${STRAIT_IMAGE:-ghcr.io/strait-dev/strait:0.2.0} # x-release-please-version
    environment:
      SEQUIN_API_TOKEN: ${SEQUIN_API_TOKEN:?run ./packages/scripts/selfhost-init.sh}

  strait:
    container_name: strait-api
    image: ${STRAIT_IMAGE:-ghcr.io/strait-dev/strait:0.2.0} # x-release-please-version
    ports:
      - "8080:8080"
    environment:
      SEQUIN_API_TOKEN: ${SEQUIN_API_TOKEN:?run ./packages/scripts/selfhost-init.sh}
      STRAIT_EDITION: community
      ALLOW_PRIVATE_ENDPOINTS: "false"

  strait-app-migrate:
    profiles: ["dashboard"]
    container_name: strait-app-migrate
    image: ${STRAIT_APP_IMAGE:-ghcr.io/strait-dev/strait-app:0.2.0} # x-release-please-version
    restart: "no"
    command: [".output/migrate.mjs"]
    env_file:
      - .env.selfhost
    environment:
      AUTH_DATABASE_URL: postgres://strait:strait@postgres:5432/strait?sslmode=disable
      BETTER_AUTH_URL: http://localhost:3000
      RESEND_API_KEY: "re_selfhost_placeholder"
    depends_on:
      postgres:
        condition: service_healthy

  strait-app:
    profiles: ["dashboard"]
    container_name: strait-app
    image: ${STRAIT_APP_IMAGE:-ghcr.io/strait-dev/strait-app:0.2.0} # x-release-please-version
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.selfhost
    environment:
      STRAIT_API_URL: http://strait:8080
      AUTH_DATABASE_URL: postgres://strait:strait@postgres:5432/strait?sslmode=disable
      BETTER_AUTH_URL: http://localhost:3000
      RESEND_API_KEY: "re_selfhost_placeholder"
      PORT: "3000"
    depends_on:
      strait:
        condition: service_healthy
      postgres:
        condition: service_healthy
      strait-app-migrate:
        condition: service_completed_successfully
